<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>table — admin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FFFFFF; --card: #F7F5F2; --input: #F0EDE8;
      --text: #1C1C1E; --muted: #8E8E93; --border: #E5E1DA;
      --red: #C0392B; --green: #27AE60;
    }
    html { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; -webkit-font-smoothing: antialiased; }
    body { min-height: 100dvh; }
    main { max-width: 720px; margin-inline: auto; padding: clamp(2rem, 6vw, 4rem) clamp(1.5rem, 4vw, 3rem); }

    nav { margin-bottom: 2.5rem; }
    nav a { font-size: 0.72rem; color: var(--muted); text-decoration: none; letter-spacing: 0.04em; }
    nav a:hover { color: var(--text); }

    .eyebrow { font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
    h1 { font-size: 1rem; font-weight: 500; margin-bottom: 2rem; }

    /* Auth */
    .auth { max-width: 320px; }
    .auth label { font-size: 0.62rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 0.4rem; }
    .auth input { width: 100%; font-family: 'DM Mono', monospace; font-size: 0.85rem; background: var(--input); border: 1px solid var(--border); border-radius: 8px; padding: 0.6rem 0.85rem; color: var(--text); outline: none; margin-bottom: 0.75rem; }
    .auth input:focus { border-color: var(--text); background: var(--bg); }
    .btn { font-family: 'DM Mono', monospace; font-size: 0.72rem; letter-spacing: 0.06em; background: var(--text); color: var(--bg); border: none; border-radius: 9999px; padding: 0.55rem 1.25rem; cursor: pointer; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.8; }
    .btn-ghost { background: none; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--text); opacity: 1; }
    .err { font-size: 0.7rem; color: var(--red); margin-top: 0.5rem; display: none; }
    .err.on { display: block; }

    /* Events */
    .events { display: flex; flex-direction: column; gap: 1.5rem; }

    .event-card { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .event-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 1rem 1.25rem; gap: 1rem; background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .event-title { font-size: 0.9rem; font-weight: 500; }
    .event-sub { font-size: 0.65rem; color: var(--muted); margin-top: 0.2rem; letter-spacing: 0.03em; }
    .event-badges { display: flex; gap: 0.5rem; flex-shrink: 0; align-items: flex-start; flex-wrap: wrap; justify-content: flex-end; }
    .badge {
      font-size: 0.58rem; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 0.25rem 0.6rem; border-radius: 9999px; border: 1px solid var(--border);
      color: var(--muted); white-space: nowrap;
    }
    .badge.ready { border-color: var(--green); color: var(--green); }
    .badge.tbd { border-color: var(--muted); }
    .badge.dated { border-color: var(--text); color: var(--text); }

    /* Threshold bar */
    .threshold-row { padding: 0.75rem 1.25rem; border-bottom: 1px solid var(--border); background: var(--bg); }
    .threshold-label { font-size: 0.62rem; color: var(--muted); margin-bottom: 0.4rem; display: flex; justify-content: space-between; }
    .threshold-bar { height: 4px; background: var(--border); border-radius: 9999px; overflow: hidden; }
    .threshold-fill { height: 100%; background: var(--text); border-radius: 9999px; transition: width 0.3s; }
    .threshold-fill.ready { background: var(--green); }

    /* Set date form */
    .set-date-form { padding: 0.85rem 1.25rem; border-bottom: 1px solid var(--border); background: var(--bg); display: flex; gap: 0.75rem; align-items: flex-end; flex-wrap: wrap; }
    .set-date-form label { font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 0.3rem; }
    .set-date-form input { font-family: 'DM Mono', monospace; font-size: 0.78rem; background: var(--input); border: 1px solid var(--border); border-radius: 8px; padding: 0.45rem 0.7rem; color: var(--text); outline: none; }
    .set-date-form input:focus { border-color: var(--text); background: var(--bg); }

    /* Bookings */
    .bookings-toggle { padding: 0.65rem 1.25rem; font-size: 0.65rem; color: var(--muted); cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none; }
    .bookings-toggle:hover { color: var(--text); }
    .bookings-list { display: none; }
    .bookings-list.open { display: block; }
    .booking-row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 0.55rem 1.25rem; border-top: 1px solid var(--border);
      font-size: 0.72rem; gap: 1rem;
    }
    .booking-row:hover { background: var(--card); }
    .booking-name { color: var(--text); }
    .booking-email { font-size: 0.62rem; color: var(--muted); }
    .booking-right { display: flex; gap: 1rem; align-items: baseline; flex-shrink: 0; }
    .booking-seats { font-size: 0.65rem; color: var(--muted); }
    .booking-status { font-size: 0.6rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }
    .booking-status.confirmed { color: var(--green); }
    .booking-status.waitlisted { color: var(--text); }
    .booking-status.refunded { color: var(--red); }
    .booking-refund-btn { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); background: none; border: none; cursor: pointer; padding: 0; text-decoration: underline; text-underline-offset: 2px; }
    .booking-refund-btn:hover { color: var(--red); }

    .no-bookings { padding: 0.75rem 1.25rem; font-size: 0.65rem; color: var(--muted); border-top: 1px solid var(--border); }

    .section-label { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }
    .add-event-section { margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .form-full { grid-column: 1 / -1; }
    .form-field label { font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 0.3rem; }
    .form-field input, .form-field select, .form-field textarea {
      width: 100%; font-family: 'DM Mono', monospace; font-size: 0.8rem;
      background: var(--input); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.55rem 0.8rem; color: var(--text); outline: none;
    }
    .form-field input:focus, .form-field select:focus, .form-field textarea:focus { border-color: var(--text); background: var(--bg); }
    .form-actions { margin-top: 1rem; display: flex; gap: 0.75rem; align-items: center; }
    .form-msg { font-size: 0.68rem; color: var(--muted); }
    .form-msg.ok { color: var(--green); }
    .form-msg.err { color: var(--red); }

    /* Pool */
    .pool-slug { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 1.5rem; }
    .pool-slug-header { display: flex; justify-content: space-between; align-items: center; padding: 0.85rem 1.25rem; background: var(--card); border-bottom: 1px solid var(--border); gap: 1rem; }
    .pool-slug-name { font-size: 0.9rem; font-weight: 500; }
    .pool-slug-stats { font-size: 0.65rem; color: var(--muted); }
    .pool-call-form { display: flex; gap: 0.65rem; align-items: flex-end; padding: 0.85rem 1.25rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .pool-call-form label { font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 0.3rem; }
    .pool-call-form input { font-family: 'DM Mono', monospace; font-size: 0.78rem; background: var(--input); border: 1px solid var(--border); border-radius: 8px; padding: 0.45rem 0.7rem; color: var(--text); outline: none; }
    .pool-call-form input:focus { border-color: var(--text); background: var(--bg); }
    .pool-call-result { font-size: 0.65rem; color: var(--muted); padding: 0 1.25rem 0.65rem; display: none; }
    .pool-call-result.on { display: block; }
    .pool-member { display: flex; justify-content: space-between; align-items: center; padding: 0.55rem 1.25rem; border-top: 1px solid var(--border); gap: 1rem; font-size: 0.72rem; }
    .pool-member:hover { background: var(--card); }
    .pool-member-left { flex: 1; }
    .pool-member-name { color: var(--text); }
    .pool-member-email { font-size: 0.62rem; color: var(--muted); }
    .pool-member-right { display: flex; gap: 0.75rem; align-items: center; flex-shrink: 0; }
    .pool-member-meta { font-size: 0.62rem; color: var(--muted); text-align: right; }
    .pool-status { font-size: 0.58rem; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.2rem 0.55rem; border-radius: 9999px; }
    .pool-status.waiting  { background: var(--card); color: var(--muted); }
    .pool-status.called   { background: #fef3cd; color: #856404; }
    .pool-status.attended { background: #d4edda; color: #155724; }
    .pool-attended-btn { font-family: 'DM Mono', monospace; font-size: 0.58rem; color: var(--muted); background: none; border: 1px solid var(--border); border-radius: 9999px; padding: 0.15rem 0.55rem; cursor: pointer; }
    .pool-attended-btn:hover { border-color: var(--text); color: var(--text); }
    .pool-empty { padding: 0.75rem 1.25rem; font-size: 0.65rem; color: var(--muted); border-top: 1px solid var(--border); }

    /* Embed + connect */
    .embed-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1.25rem; margin-bottom:2rem; }
    .embed-card h3 { font-size:0.65rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin-bottom:0.75rem; }
    .embed-code { font-size:0.68rem; word-break:break-all; line-height:1.7; color:var(--text); cursor:pointer; }
    .embed-code:hover { text-decoration:underline; text-underline-offset:3px; }
    .copy-hint { font-size:0.6rem; color:var(--muted); margin-top:0.35rem; }
    .connect-btn { font-family:inherit; font-size:0.65rem; letter-spacing:0.06em; background:none; color:var(--text); border:1px solid var(--border); border-radius:9999px; padding:0.4rem 1rem; cursor:pointer; margin-top:0.75rem; }
    .connect-btn:hover { border-color:var(--text); }
    .connect-ok { font-size:0.65rem; color:var(--green); margin-top:0.5rem; display:none; }
    .connect-ok.on { display:block; }
    .auth-toggle { font-size:0.65rem; color:var(--muted); margin-top:0.75rem; }
    .auth-toggle button { font-family:inherit; font-size:inherit; color:var(--text); background:none; border:none; cursor:pointer; text-decoration:underline; text-underline-offset:3px; }
  </style>
</head>
<body>
<main>
  <nav><a href="/table">← table</a></nav>
  <div class="eyebrow">box fraise</div>
  <h1>table admin</h1>

  <div id="auth-section">
    <!-- Global admin PIN -->
    <div id="pin-view" class="auth">
      <label for="pin-input">admin pin</label>
      <input type="password" id="pin-input" placeholder="••••••" autocomplete="off" />
      <button class="btn" onclick="doAuth()">enter →</button>
      <div class="err" id="auth-err">incorrect pin</div>
      <div class="auth-toggle" style="margin-top:0.75rem;">venue operator? <button onclick="showVenueLogin()">sign in here</button></div>
    </div>

    <!-- Venue operator login -->
    <div id="venue-login-view" style="display:none;" class="auth">
      <label for="v-email">email</label>
      <input type="email" id="v-email" placeholder="you@yourvenue.com" autocomplete="email" style="margin-bottom:0.75rem;" />
      <label for="v-pw">password</label>
      <input type="password" id="v-pw" placeholder="••••••••" autocomplete="current-password" />
      <button class="btn" style="margin-top:0.75rem;" onclick="doVenueLogin()">sign in →</button>
      <div class="err" id="venue-err"></div>
      <div class="auth-toggle">box fraise admin? <button onclick="showPinLogin()">use pin</button></div>
    </div>
  </div>

  <div id="dashboard" style="display:none;">
    <!-- Embed + connect card (shown for venue operators) -->
    <div id="venue-card" style="display:none;">
      <div class="embed-card">
        <h3>embed code</h3>
        <div class="embed-code" id="embed-code-display" onclick="copyEmbed()"></div>
        <div class="copy-hint" id="embed-copy-hint">click to copy</div>
        <div style="margin-top:1rem;border-top:1px solid var(--border);padding-top:1rem;">
          <div style="font-size:0.6rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem;">payouts</div>
          <button class="connect-btn" id="connect-stripe-btn" onclick="connectStripe()">connect stripe →</button>
          <div class="connect-ok" id="connect-ok">stripe connected. payouts active.</div>
        </div>
      </div>
    </div>

    <div class="section-label" style="margin-bottom:1.5rem;">events</div>
    <div class="events" id="events-list"></div>

    <div id="pool-section" style="margin-top:3rem;padding-top:2rem;border-top:1px solid var(--border);display:none;">
      <div class="section-label" style="margin-bottom:1.5rem;">pool</div>
      <div id="pool-list"></div>
    </div>

    <div class="add-event-section">
      <div class="section-label">add event</div>
      <div class="form-grid" id="add-event-form">
        <div class="form-field form-full">
          <label>title</label>
          <input type="text" id="ae-title" placeholder="e.g. espresso class" />
        </div>
        <div class="form-field">
          <label>venue name</label>
          <input type="text" id="ae-venue" placeholder="e.g. Kommune" />
        </div>
        <div class="form-field">
          <label>venue address</label>
          <input type="text" id="ae-address" placeholder="11931 Jasper Ave NW" />
        </div>
        <div class="form-field">
          <label>instructor id</label>
          <input type="number" id="ae-instructor" placeholder="1" />
        </div>
        <div class="form-field">
          <label>price (CAD)</label>
          <input type="number" id="ae-price" placeholder="85" />
        </div>
        <div class="form-field">
          <label>capacity</label>
          <input type="number" id="ae-capacity" placeholder="12" />
        </div>
        <div class="form-field">
          <label>threshold (min signups)</label>
          <input type="number" id="ae-threshold" placeholder="8" />
        </div>
        <div class="form-field">
          <label>duration (min)</label>
          <input type="number" id="ae-duration" placeholder="90" />
        </div>
        <div class="form-field form-full">
          <label>description</label>
          <textarea id="ae-desc" rows="2" placeholder="what happens at this event"></textarea>
        </div>
        <div class="form-actions form-full">
          <button class="btn" onclick="addEvent()">create event →</button>
          <span class="form-msg" id="add-event-msg"></span>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
  let pin = '';
  let venueToken = null;
  let venueSlug  = null;
  let venuePriceCents = 12000;

  // Auto-login if venue session exists
  const storedToken = localStorage.getItem('venue_token');
  const storedSlug  = localStorage.getItem('venue_slug');
  if (storedToken && storedSlug) {
    venueToken = storedToken; venueSlug = storedSlug;
    venuePriceCents = parseInt(localStorage.getItem('venue_price') || '12000');
    document.getElementById('auth-section').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadDashboard();
    showVenueCard();
  }

  document.getElementById('pin-input').addEventListener('keydown', e => { if (e.key === 'Enter') doAuth(); });
  document.getElementById('v-pw').addEventListener('keydown', e => { if (e.key === 'Enter') doVenueLogin(); });

  function showVenueLogin() {
    document.getElementById('pin-view').style.display = 'none';
    document.getElementById('venue-login-view').style.display = 'block';
    document.getElementById('v-email').focus();
  }
  function showPinLogin() {
    document.getElementById('venue-login-view').style.display = 'none';
    document.getElementById('pin-view').style.display = 'block';
  }

  async function doAuth() {
    const val = document.getElementById('pin-input').value.trim();
    if (!val) return;
    const res = await fetch('/api/table/events', { headers: { 'X-Admin-PIN': val } });
    if (!res.ok && res.status === 401) { document.getElementById('auth-err').classList.add('on'); return; }
    pin = val;
    document.getElementById('auth-section').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadDashboard();
  }

  async function doVenueLogin() {
    const email = document.getElementById('v-email').value.trim();
    const pw    = document.getElementById('v-pw').value;
    const err   = document.getElementById('venue-err');
    err.classList.remove('on');
    if (!email || !pw) return;
    const res = await fetch('/api/table/venues/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pw }),
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error || 'invalid credentials'; err.classList.add('on'); return; }
    venueToken = data.token; venueSlug = data.slug; venuePriceCents = data.price_cents;
    localStorage.setItem('venue_token', data.token);
    localStorage.setItem('venue_slug',  data.slug);
    localStorage.setItem('venue_price', String(data.price_cents));
    localStorage.setItem('venue_name',  data.display_name || data.slug);
    localStorage.setItem('venue_connected', String(data.stripe_connect_onboarded || false));
    document.getElementById('auth-section').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    showVenueCard(data);
    loadDashboard();
  }

  function showVenueCard(data) {
    const card = document.getElementById('venue-card');
    card.style.display = 'block';
    const slug  = venueSlug;
    const price = venuePriceCents;
    const code  = `<script src="https://api.fraise.box/table/widget.js?slug=${slug}&price=${price}"><\/script>`;
    document.getElementById('embed-code-display').textContent = code;
    const connected = data?.stripe_connect_onboarded || localStorage.getItem('venue_connected') === 'true';
    if (connected) {
      document.getElementById('connect-ok').classList.add('on');
      document.getElementById('connect-stripe-btn').style.display = 'none';
    }
    if (window.location.search.includes('connect=done')) verifyConnect();
  }

  function copyEmbed() {
    const code = document.getElementById('embed-code-display').textContent;
    navigator.clipboard?.writeText(code);
    const hint = document.getElementById('embed-copy-hint');
    hint.textContent = 'copied.';
    setTimeout(() => { hint.textContent = 'click to copy'; }, 2000);
  }

  async function connectStripe() {
    if (!venueToken) return;
    document.getElementById('connect-stripe-btn').textContent = '—';
    const res = await fetch('/api/table/venues/connect', {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Venue-Token': venueToken },
      body: JSON.stringify({ return_url: window.location.href }),
    });
    const data = await res.json();
    if (data.url) window.location.href = data.url;
    else document.getElementById('connect-stripe-btn').textContent = 'connect stripe →';
  }

  async function verifyConnect() {
    if (!venueToken) return;
    const res = await fetch('/api/table/venues/connect/verify', {
      method: 'POST', headers: { 'X-Venue-Token': venueToken },
    });
    const data = await res.json();
    if (data.onboarded) {
      localStorage.setItem('venue_connected', 'true');
      document.getElementById('connect-ok').classList.add('on');
      document.getElementById('connect-stripe-btn').style.display = 'none';
    }
  }

  function authHeaders() {
    if (venueToken) return { 'X-Venue-Token': venueToken };
    return { 'X-Admin-PIN': pin };
  }

  async function loadDashboard() {
    if (venueToken && venueSlug) {
      // Operator: only load their own slug pool
      const [eventsRes, poolRes] = await Promise.all([
        fetch('/api/table/events?slug=' + venueSlug),
        fetch('/api/table/pool?slug=' + venueSlug, { headers: authHeaders() }),
      ]);
      const events = (await eventsRes.json()) ?? [];
      const poolData = await poolRes.json();
      renderEvents(events, []);
      document.getElementById('pool-section').style.display = 'block';
      document.getElementById('pool-list').innerHTML = '';
      document.getElementById('pool-list').appendChild(
        buildPoolCard(venueSlug, poolData.members ?? [], poolData.waiting ?? 0, poolData.total ?? 0)
      );
    } else {
      // Global admin: all events + all pools
      const [eventsRes, bookingsRes, slugsRes] = await Promise.all([
        fetch('/api/table/events', { headers: authHeaders() }),
        fetch('/api/table/bookings', { headers: authHeaders() }),
        fetch('/api/table/pool/slugs', { headers: authHeaders() }),
      ]);
      const events = await eventsRes.json();
      const bookings = await bookingsRes.json();
      const slugsData = await slugsRes.json();
      renderEvents(events, bookings);
      if ((slugsData.slugs ?? []).length) {
        document.getElementById('pool-section').style.display = 'block';
        loadAllPools(slugsData.slugs);
      }
    }
  }

  async function loadAllPools(slugs) {
    const results = await Promise.all(
      slugs.map(s => fetch('/api/table/pool?slug=' + encodeURIComponent(s.slug), { headers: { 'X-Admin-PIN': pin } }).then(r => r.json()))
    );
    const container = document.getElementById('pool-list');
    container.innerHTML = '';
    results.forEach((data, i) => {
      const slug = slugs[i].slug;
      container.appendChild(buildPoolCard(slug, data.members ?? [], data.waiting ?? 0, data.total ?? 0));
    });
  }

  function buildPoolCard(slug, members, waiting, total) {
    const div = document.createElement('div');
    div.className = 'pool-slug';
    div.id = 'pool-card-' + slug;

    const callResultId = 'pool-call-result-' + slug;
    const seatsId = 'pool-seats-' + slug;
    const noteId  = 'pool-note-' + slug;

    div.innerHTML = `
      <div class="pool-slug-header">
        <div>
          <div class="pool-slug-name">${esc(slug)}</div>
          <div class="pool-slug-stats">${waiting} waiting · ${total} total</div>
        </div>
      </div>
      <div class="pool-call-form">
        <div>
          <label>seats to call</label>
          <input type="number" id="${seatsId}" value="8" min="1" style="width:5rem;" />
        </div>
        <div style="flex:1;min-width:160px;">
          <label>note (optional)</label>
          <input type="text" id="${noteId}" placeholder="dinner, details to follow" />
        </div>
        <button class="btn pool-call-btn">send call →</button>
      </div>
      <div class="pool-call-result" id="${callResultId}"></div>
      ${members.length ? members.map(m => {
        const joined = new Date(m.created_at).toLocaleDateString('en-CA', { month: 'short', day: 'numeric' });
        return `
          <div class="pool-member">
            <div class="pool-member-left">
              <div class="pool-member-name">${esc(m.name)}</div>
              <div class="pool-member-email">${esc(m.email)}</div>
            </div>
            <div class="pool-member-right">
              <div class="pool-member-meta">${joined}${m.events_attended > 0 ? ' · ' + m.events_attended + ' attended' : ''}</div>
              <span class="pool-status ${m.status}">${m.status}</span>
              ${m.status === 'called' ? `<button class="pool-attended-btn" data-id="${m.id}">attended</button>` : ''}
            </div>
          </div>
        `;
      }).join('') : '<div class="pool-empty">no members yet.</div>'}
    `;
    // Wire event listeners after innerHTML — avoids slug injection in onclick attributes
    div.querySelector('.pool-call-btn').addEventListener('click', () => sendCall(slug));
    div.querySelectorAll('.pool-attended-btn').forEach(btn => {
      btn.addEventListener('click', () => markAttended(parseInt(btn.dataset.id), slug));
    });
    return div;
  }

  async function sendCall(slug) {
    const seats = parseInt(document.getElementById('pool-seats-' + slug).value) || 0;
    const note  = document.getElementById('pool-note-' + slug).value.trim();
    const resultEl = document.getElementById('pool-call-result-' + slug);
    if (seats < 1) return;
    const res = await fetch('/api/table/pool/call', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({ slug, seats, note }),
    });
    const data = await res.json();
    resultEl.style.display = 'block';
    if (!res.ok) { resultEl.textContent = data.error || 'failed.'; resultEl.classList.add('on'); return; }
    const called = data.called ?? [];
    const names = called.map(m => m.name).join(', ');
    resultEl.textContent = `called ${called.length}: ${names}`;
    resultEl.classList.add('on');
    loadDashboard();
  }

  async function markAttended(id, slug) {
    await fetch('/api/table/pool/attend', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({ ids: [id] }),
    });
    loadDashboard();
  }

  function fmtPrice(cents) {
    return `CA$${(cents / 100).toFixed(0)}`;
  }

  function fmtDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('en-CA', { weekday: 'short', month: 'short', day: 'numeric' }) +
           ' · ' + d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0');
  }

  function renderEvents(events, bookings) {
    const container = document.getElementById('events-list');
    if (!events.length) {
      container.innerHTML = '<div style="font-size:0.72rem;color:var(--muted);">no events yet.</div>';
      return;
    }

    container.innerHTML = events.map(ev => {
      const evBookings = bookings.filter(b => b.event_id === ev.id);
      const confirmedCount = evBookings.filter(b => b.status === 'confirmed').length;
      const waitlistedCount = evBookings.filter(b => b.status === 'waitlisted').length;
      const refundedCount = evBookings.filter(b => b.status === 'refunded').length;
      const totalSeats = evBookings.filter(b => ['confirmed','waitlisted'].includes(b.status)).reduce((s, b) => s + b.seats, 0);
      const threshold = ev.threshold ?? ev.capacity;
      const pct = Math.min(100, Math.round((totalSeats / threshold) * 100));
      const ready = totalSeats >= threshold;
      const dated = !ev.date_tbd && ev.event_date;

      return `
        <div class="event-card" id="card-${ev.id}">
          <div class="event-header">
            <div>
              <div class="event-title">${ev.title.toLowerCase()}</div>
              <div class="event-sub">${ev.venue_name.toLowerCase()} · ${fmtPrice(ev.price_cents)} · ${ev.duration_minutes}min</div>
              <div class="event-sub" style="margin-top:0.15rem;">${totalSeats} signed up · ${ev.capacity} capacity${ev.threshold ? ' · ' + ev.threshold + ' threshold' : ''}</div>
            </div>
            <div class="event-badges">
              ${dated ? `<span class="badge dated">${fmtDate(ev.event_date)}</span>` : ''}
              ${ready && !dated ? '<span class="badge ready">threshold reached</span>' : ''}
              ${!dated ? '<span class="badge tbd">date tbd</span>' : ''}
            </div>
          </div>

          ${ev.threshold ? `
          <div class="threshold-row">
            <div class="threshold-label">
              <span>signups vs threshold</span>
              <span>${totalSeats} / ${threshold}</span>
            </div>
            <div class="threshold-bar">
              <div class="threshold-fill ${ready ? 'ready' : ''}" style="width:${pct}%;"></div>
            </div>
          </div>
          ` : ''}

          ${!dated ? `
          <div class="set-date-form">
            <div>
              <label>date</label>
              <input type="date" id="sd-date-${ev.id}" />
            </div>
            <div>
              <label>time</label>
              <input type="time" id="sd-time-${ev.id}" />
            </div>
            <button class="btn ${ready ? '' : 'btn-ghost'}" onclick="setDate(${ev.id})">set date + notify →</button>
          </div>
          ` : ''}

          <div class="bookings-toggle" onclick="toggleBookings(${ev.id})">
            <span>${evBookings.filter(b => ['confirmed','waitlisted'].includes(b.status)).length} active · ${refundedCount} refunded</span>
            <span id="toggle-label-${ev.id}">show ↓</span>
          </div>
          <div class="bookings-list" id="bookings-${ev.id}">
            ${evBookings.length ? evBookings.map(b => `
              <div class="booking-row">
                <div>
                  <div class="booking-name">${esc(b.name)}</div>
                  <div class="booking-email">${esc(b.email)}</div>
                </div>
                <div class="booking-right">
                  <span class="booking-seats">${b.seats} seat${b.seats !== 1 ? 's' : ''}</span>
                  <span class="booking-status ${b.status}">${b.status}</span>
                  ${['confirmed','waitlisted'].includes(b.status) ? `<button class="booking-refund-btn" onclick="refundBooking(${b.id}, this)">refund</button>` : ''}
                </div>
              </div>
            `).join('') : '<div class="no-bookings">no bookings yet.</div>'}
          </div>
        </div>
      `;
    }).join('');
  }

  function toggleBookings(id) {
    const list = document.getElementById('bookings-' + id);
    const label = document.getElementById('toggle-label-' + id);
    const open = list.classList.toggle('open');
    label.textContent = open ? 'hide ↑' : 'show ↓';
  }

  async function setDate(id) {
    const date = document.getElementById('sd-date-' + id).value;
    const time = document.getElementById('sd-time-' + id).value;
    if (!date || !time) return;
    const event_date = new Date(date + 'T' + time).toISOString();
    const res = await fetch('/api/table/events/' + id, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'X-Admin-PIN': pin },
      body: JSON.stringify({ event_date }),
    });
    if (res.ok) loadDashboard();
  }

  async function refundBooking(id, btn) {
    if (!confirm('refund this booking?')) return;
    btn.textContent = '…';
    const res = await fetch('/api/table/bookings/' + id + '/refund', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-PIN': pin },
    });
    if (res.ok) loadDashboard();
    else btn.textContent = 'error';
  }

  async function addEvent() {
    const msg = document.getElementById('add-event-msg');
    const title = document.getElementById('ae-title').value.trim();
    const venue_name = document.getElementById('ae-venue').value.trim();
    const venue_address = document.getElementById('ae-address').value.trim();
    const instructor_id = parseInt(document.getElementById('ae-instructor').value);
    const price_cents = Math.round(parseFloat(document.getElementById('ae-price').value) * 100);
    const capacity = parseInt(document.getElementById('ae-capacity').value) || 12;
    const threshold = parseInt(document.getElementById('ae-threshold').value) || null;
    const duration_minutes = parseInt(document.getElementById('ae-duration').value) || 90;
    const description = document.getElementById('ae-desc').value.trim();

    if (!title || !venue_name || !instructor_id || !price_cents) {
      msg.textContent = 'title, venue, instructor, and price are required.';
      msg.className = 'form-msg err';
      return;
    }

    const res = await fetch('/api/table/events', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-PIN': pin },
      body: JSON.stringify({ title, venue_name, venue_address, instructor_id, price_cents, capacity, threshold, duration_minutes, description }),
    });

    if (res.ok) {
      msg.textContent = 'event created.';
      msg.className = 'form-msg ok';
      ['ae-title','ae-venue','ae-address','ae-instructor','ae-price','ae-capacity','ae-threshold','ae-duration','ae-desc']
        .forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
      loadDashboard();
    } else {
      msg.textContent = 'failed to create event.';
      msg.className = 'form-msg err';
    }
  }

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
