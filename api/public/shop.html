<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>box fraise — shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #FFFFFF; --text: #111111; --muted: #666666; --border: #DDDDDD; }
    html { background: var(--bg); color: var(--text); font-family: 'Lora', 'Times New Roman', Georgia, serif; font-size: 17px; line-height: 1.75; -webkit-font-smoothing: antialiased; }
    body { min-height: 100dvh; }
    main { width: 100%; max-width: 680px; margin-inline: auto; padding-inline: clamp(2rem, 6vw, 5rem); padding-block: clamp(3rem, 8vw, 6rem); }
    nav { margin-bottom: 2rem; }
    nav a { font-size: 0.8125rem; letter-spacing: 0.04em; text-decoration: none; color: var(--muted); }
    h1 { font-size: clamp(1.4rem, 3vw, 1.75rem); font-weight: 400; line-height: 1.3; }
    .meta { font-size: 0.8125rem; color: var(--muted); letter-spacing: 0.03em; margin-top: 0.75rem; margin-bottom: 2.5rem; }
    hr { border: none; border-top: 1px solid var(--border); margin-block: 2.5rem; }
    .product { border-top: 1px solid var(--border); padding-top: 2rem; margin-top: 2rem; }
    .product h2 { font-size: 1rem; font-weight: 400; margin-bottom: 0.5rem; }
    .product p { color: var(--muted); font-style: italic; margin-bottom: 1rem; }
    .price { margin: 1rem 0; font-size: 0.9375rem; letter-spacing: 0.02em; font-style: normal; color: var(--text); }
    .btn { display: inline-block; font-size: 0.8125rem; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; border: 1px solid var(--text); padding: 0.6rem 1.25rem; color: var(--text); }
    footer { margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border); }
    footer p { font-size: 0.8125rem; color: var(--muted); }
  </style>
</head>
<body>
  <main>
    <header style="margin-bottom: 3rem;">
      <nav><a href="/">← box fraise</a></nav>
      <h1>shop</h1>
      <p class="meta">fraise.box — pre-order</p>
    </header>

    <hr />

    <div class="product">
      <h2>Sticker Pack</h2>
      <p>5 die-cut vinyl strawberry stickers. Weatherproof, kiss-cut, ready to go anywhere.</p>
      <p class="price">$14.00 CAD</p>
      <a href="https://shop.fraise.box/cart/50900019970281:1" class="btn">Pre-order</a>
    </div>

    <footer>
      <p>box fraise — fraise.box — 2026</p>
    </footer>
  </main>
</body>
</html>
