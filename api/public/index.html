<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>box fraise</title>
  <meta name="description" content="Better taste." />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #FFFFFF;
      --text:     #111111;
      --muted:    #666666;
      --border:   #E0E0E0;
      --input-bg: #F5F5F5;
      --oxblood:  #4a1519;
    }

    html {
      background: var(--bg);
      color: var(--text);
      font-family: 'Lora', Georgia, serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      gap: 2rem;
    }

    /* ── Wordmark ── */
    .wordmark {
      text-align: center;
    }

    .wordmark h1 {
      font-size: 2.25rem;
      font-weight: 400;
      letter-spacing: -0.01em;
      color: var(--oxblood);
    }

    .wordmark p {
      font-size: 0.875rem;
      color: var(--muted);
      margin-top: 0.25rem;
      font-style: italic;
    }

    /* ── Search bar ── */
    .search-wrap {
      width: 100%;
      max-width: 580px;
      position: relative;
    }

    .search-form {
      display: flex;
      align-items: center;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 9999px;
      padding: 0.65rem 1.25rem;
      gap: 0.75rem;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .search-form:focus-within {
      border-color: var(--oxblood);
      box-shadow: 0 0 0 3px rgba(74, 21, 25, 0.08);
      background: #fff;
    }

    .search-icon {
      flex-shrink: 0;
      color: var(--muted);
      width: 16px;
      height: 16px;
    }

    .search-input {
      flex: 1;
      border: none;
      background: transparent;
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      min-width: 0;
    }

    .search-input::placeholder {
      color: #aaa;
    }

    .search-privacy {
      flex-shrink: 0;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    /* ── Quick links ── */
    .quick-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      max-width: 580px;
    }

    .chip {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 9999px;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      text-decoration: none;
      background: var(--bg);
      transition: border-color 0.15s, color 0.15s;
    }

    .chip:hover {
      border-color: var(--oxblood);
      color: var(--oxblood);
    }

    .chip-icon {
      font-size: 0.8rem;
    }

    /* ── Privacy note ── */
    .privacy-note {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: #bbb;
      text-align: center;
      letter-spacing: 0.03em;
    }

    .privacy-note a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* ── Footer ── */
    .site-footer {
      position: fixed;
      bottom: 1.25rem;
      right: 1.5rem;
      display: flex;
      gap: 1.25rem;
    }

    .site-footer a {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: #ccc;
      text-decoration: none;
      letter-spacing: 0.03em;
    }

    .site-footer a:hover {
      color: var(--oxblood);
    }

    @media (max-width: 480px) {
      .wordmark h1 { font-size: 1.75rem; }
      .search-privacy { display: none; }
      .site-footer { position: static; margin-top: 1rem; justify-content: center; }
    }
  </style>
</head>
<body>

  <div class="wordmark">
    <h1>box fraise</h1>
    <p>Search privately. No tracking. No logs.</p>
  </div>

  <div class="search-wrap">
    <form class="search-form" id="search-form" autocomplete="off">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        class="search-input"
        id="search-input"
        type="text"
        placeholder="search or enter a url"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      />
      <span class="search-privacy">no logs &nbsp;·&nbsp; no tracking</span>
    </form>
  </div>

  <div class="quick-links">
    <a href="/device" class="chip"><span class="chip-icon">⬡</span> device</a>
    <a href="/paper" class="chip"><span class="chip-icon">§</span> paper</a>
    <a href="https://testflight.apple.com/join/zJG1Wc5Y" class="chip"><span class="chip-icon">↓</span> beta</a>
    <a href="/shop" class="chip"><span class="chip-icon">◈</span> shop</a>
    <a href="/support" class="chip"><span class="chip-icon">?</span> support</a>
  </div>

  <p class="privacy-note">searches are sent to <a href="https://duckduckgo.com/privacy" target="_blank" rel="noopener">DuckDuckGo</a> — your query leaves this server immediately and is not stored.</p>

  <footer class="site-footer">
    <a href="/privacy">privacy</a>
    <a href="/paper">working paper</a>
  </footer>

  <script>
    const form = document.getElementById('search-form');
    const input = document.getElementById('search-input');

    // Internal fraise.box paths — navigate directly
    const internalRoutes = {
      'device': '/device',
      'paper': '/paper',
      'shop': '/shop',
      'support': '/support',
      'privacy': '/privacy',
      'beta': 'https://testflight.apple.com/join/zJG1Wc5Y',
      'chocolatier': '/chocolatier',
      'operator': '/operator',
    };

    function isUrl(str) {
      // Has a dot and no spaces, or starts with http
      return /^https?:\/\//i.test(str) || (/\.\S+/.test(str) && !str.includes(' '));
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const query = input.value.trim();
      if (!query) return;

      // Internal route shortcut
      const lower = query.toLowerCase().replace(/^\//, '');
      if (internalRoutes[lower]) {
        window.location.href = internalRoutes[lower];
        return;
      }

      // URL — route through privacy hop
      if (isUrl(query)) {
        const url = /^https?:\/\//i.test(query) ? query : 'https://' + query;
        window.location.href = '/go?url=' + encodeURIComponent(url);
        return;
      }

      // Search query — send to DuckDuckGo privately
      window.location.href = 'https://duckduckgo.com/?q=' + encodeURIComponent(query) + '&kp=-1&kl=us-en&kg=p';
    });

    // Focus search bar on load
    input.focus();
  </script>

</body>
</html>
