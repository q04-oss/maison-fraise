<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>box fraise</title>
  <meta name="description" content="Better taste." />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #FFFFFF;
      --text:   #111111;
      --muted:  #666666;
      --border: #DDDDDD;
    }

    html {
      background: var(--bg);
      color: var(--text);
      font-family: 'Lora', 'Times New Roman', Georgia, serif;
      font-size: 17px;
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      width: 100%;
      max-width: 960px;
      margin-inline: auto;
      padding-inline: clamp(2rem, 6vw, 5rem);
      padding-block: clamp(3rem, 8vw, 6rem);
    }

    .layout {
      flex: 1;
      display: flex;
      align-items: center;
      gap: clamp(3rem, 8vw, 6rem);
    }

    .left {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
      min-width: 0;
    }

    .right {
      flex: 0 0 auto;
      width: clamp(240px, 40vw, 420px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: clamp(1.4rem, 3vw, 1.75rem);
      font-weight: 400;
      line-height: 1.3;
      margin-bottom: 0.75rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .btn {
      display: inline-block;
      font-family: 'Lora', serif;
      font-size: 0.8125rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.6rem 1.25rem;
      align-self: flex-start;
    }

    .btn-primary {
      border: 1px solid var(--text);
      color: var(--text);
    }

    .btn-secondary {
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .device-render {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
    }

    footer {
      padding-top: 3rem;
    }

    footer a {
      font-size: 0.8125rem;
      color: var(--muted);
      letter-spacing: 0.03em;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 560px) {
      main {
        padding-inline: 1.5rem;
        justify-content: flex-start;
        padding-block: 3rem;
      }

      .layout {
        flex-direction: column;
        align-items: center;
        gap: 2.5rem;
      }

      .left {
        align-items: center;
        text-align: center;
      }

      .left header {
        text-align: center;
      }

      nav {
        align-items: center;
      }

      .btn {
        align-self: center;
      }

      .right {
        width: 75vw;
        max-width: 300px;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="layout">
      <div class="left">
        <header>
          <h1>box fraise</h1>
          <p class="subtitle">Better taste.</p>
        </header>

        <nav>
          <a href="https://testflight.apple.com/join/zJG1Wc5Y" class="btn btn-primary">Download beta</a>
          <a href="/shop" class="btn btn-secondary">Stickers</a>
          <a href="/support" class="btn btn-secondary">Support</a>
        </nav>
      </div>

      <div class="right">
        <img src="/device.png" alt="box fraise device" class="device-render" />
      </div>
    </div>

    <footer>
      <a href="/paper">Working Paper No. 1 →</a>
    </footer>
  </main>
</body>
</html>
