<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>box fraise</title>
  <meta name="description" content="Better taste." />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #FFFFFF;
      --card:   #F7F5F2;
      --search: #F0EDE8;
      --text:   #1C1C1E;
      --muted:  #8E8E93;
      --border: #E5E1DA;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:     #0C0C0E;
        --card:   #1A1A1C;
        --search: #1A1A1C;
        --text:   #F2F2F7;
        --muted:  #8A8A8E;
        --border: #2A2A2E;
      }
    }

    html {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      gap: 1.75rem;
    }

    .wordmark { text-align: center; }
    .wordmark h1 {
      font-size: 1.5rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .search-wrap {
      width: 100%;
      max-width: 560px;
      position: relative;
    }

    .search-form {
      display: flex;
      align-items: center;
      background: var(--search);
      border: 1px solid var(--border);
      border-radius: 9999px;
      padding: 0.7rem 1.25rem;
      gap: 0.75rem;
      transition: border-color 0.15s, background 0.15s;
    }

    .search-form:focus-within {
      border-color: var(--text);
      background: var(--bg);
    }

    .search-icon {
      flex-shrink: 0;
      color: var(--muted);
      width: 15px;
      height: 15px;
    }

    .search-input {
      flex: 1;
      border: none;
      background: transparent;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--text);
      outline: none;
      min-width: 0;
    }

    .search-input::placeholder { color: var(--muted); }

    .search-privacy {
      flex-shrink: 0;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      opacity: 0.7;
    }

    .quick-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      justify-content: center;
      max-width: 560px;
    }

    .chip {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.3rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 9999px;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      text-decoration: none;
      background: var(--bg);
      letter-spacing: 0.03em;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .chip:hover {
      border-color: var(--text);
      color: var(--text);
      background: var(--card);
    }

    .site-footer {
      position: fixed;
      bottom: 1.25rem;
      right: 1.5rem;
      display: flex;
      gap: 1.25rem;
    }

    .site-footer a {
      font-size: 0.65rem;
      color: var(--border);
      text-decoration: none;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: color 0.15s;
    }

    .site-footer a:hover { color: var(--muted); }

    @media (max-width: 480px) {
      .wordmark h1 { font-size: 1.25rem; }
      .search-privacy { display: none; }
      .site-footer { position: static; margin-top: 0.5rem; justify-content: center; }
    }
  </style>
</head>
<body>

  <div class="wordmark">
    <h1>box fraise</h1>
  </div>

  <div class="search-wrap">
    <form class="search-form" id="search-form" autocomplete="off">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        class="search-input"
        id="search-input"
        type="text"
        placeholder="search privately. for better taste."
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      />
    </form>
  </div>

  <div class="quick-links">
    <a href="/join" class="chip">join</a>
    <a href="/press" class="chip">cold.press</a>
    <a href="/device" class="chip">device</a>
    <a href="https://fraise.land" class="chip">filozofia pracy</a>
  </div>

  <footer class="site-footer">
    <a href="/privacy">privacy</a>
    <a href="/paper">paper</a>
  </footer>

  <script>
    const form  = document.getElementById('search-form');
    const input = document.getElementById('search-input');

    const routes = {
      'join':          '/join',
      'fraise':        '/join',
      'business':      '/join#business',
      'press':         '/press',
      'device':        '/device',
      'paper':         '/paper',
      'shop':          '/shop',
      'support':       '/support',
      'privacy':       '/privacy',
      'chocolatier':   '/chocolatier',
      'operator':      '/operator',
      'account':       '/fraise-business.html',
      'dashboard':     '/fraise-business.html',
    };

    function isUrl(str) {
      return /^https?:\/\//i.test(str) || (/\.\S+/.test(str) && !str.includes(' '));
    }

    form.addEventListener('submit', e => {
      e.preventDefault();
      const query = input.value.trim();
      if (!query) return;
      const lower = query.toLowerCase().replace(/^\//, '');
      if (routes[lower]) { window.location.href = routes[lower]; return; }
      if (isUrl(query)) {
        const url = /^https?:\/\//i.test(query) ? query : 'https://' + query;
        window.location.href = '/go?url=' + encodeURIComponent(url);
        return;
      }
      window.location.href = '/search?q=' + encodeURIComponent(query);
    });

    // / or cmd+k focuses the search bar
    document.addEventListener('keydown', e => {
      if (document.activeElement === input) return;
      if (e.key === '/' || (e.key === 'k' && (e.metaKey || e.ctrlKey))) {
        e.preventDefault();
        input.focus();
        input.select();
      }
    });

    input.focus();
  </script>

</body>
</html>
