<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Box Fraise — Operator</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0C0C0E;
      --bg2:     #0A0A0C;
      --card:    rgba(28,28,30,0.95);
      --card2:   #1A1A1C;
      --amber:   #C9973A;
      --amber2:  #D4A843;
      --text:    #F2F2F7;
      --muted:   rgba(242,242,247,0.42);
      --border:  rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.13);
      --red:     rgba(220,80,80,0.9);
      --green:   rgba(80,200,120,0.9);
      --radius:  14px;
    }

    body { font-family: 'DM Sans', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── PIN ── */
    #pin-screen {
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 40px 24px; gap: 32px; background: var(--bg2);
      position: relative; overflow: hidden;
    }
    #pin-screen::before {
      content: ''; position: absolute; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.016) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.016) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 0%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 0%, transparent 100%);
      pointer-events: none;
    }
    #pin-screen::after {
      content: ''; position: absolute; top: 30%; left: 50%; transform: translate(-50%,-50%);
      width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, rgba(201,151,58,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .logo-block { text-align: center; position: relative; z-index: 1; }
    .logo-title { font-family: 'Playfair Display', serif; font-style: italic; font-size: 32px; color: var(--text); }
    .logo-sub { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--amber); margin-top: 8px; }
    .pin-card { background: var(--card); border: 1px solid var(--border2); border-radius: var(--radius); padding: 28px 24px; width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 16px; position: relative; z-index: 1; }
    .pin-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
    .pin-input { width: 100%; padding: 14px 16px; font-size: 22px; letter-spacing: 8px; border: 1px solid var(--border2); border-radius: 10px; background: rgba(255,255,255,0.04); color: var(--text); outline: none; text-align: center; font-family: 'DM Mono', monospace; transition: border-color 0.2s; }
    .pin-input:focus { border-color: var(--amber); }
    .pin-input::placeholder { opacity: 0.3; }
    .pin-btn { width: 100%; padding: 16px; background: var(--amber); color: #0C0C0E; border: none; border-radius: 30px; font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: opacity 0.15s; }
    .pin-btn:active { opacity: 0.8; }
    .pin-error { font-family: 'DM Mono', monospace; font-size: 12px; color: #E05A5A; text-align: center; min-height: 18px; }

    /* ── DASHBOARD ── */
    #dashboard { display: none; flex-direction: column; min-height: 100vh; }
    .dash-header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 52px 20px 0; }
    .dash-header-top { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; padding-bottom: 16px; }
    .dash-header-left { display: flex; flex-direction: column; gap: 4px; }
    .dash-role { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--amber); }
    .dash-title { font-family: 'Playfair Display', serif; font-size: 30px; color: var(--text); }
    .dash-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 2px; }
    .logout-btn { background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; padding: 9px 16px; border-radius: 20px; cursor: pointer; white-space: nowrap; transition: color 0.2s, border-color 0.2s; }
    .logout-btn:hover { color: var(--text); border-color: var(--border2); }

    /* ── TABS ── */
    .tab-row { display: flex; gap: 0; border-top: 1px solid var(--border); }
    .tab { padding: 12px 20px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
    .tab.active { color: var(--amber); border-bottom-color: var(--amber); }

    .dash-body { flex: 1; padding: 20px 16px; display: flex; flex-direction: column; gap: 12px; }

    /* ── FILTERS ── */
    .filter-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
    .filter-row::-webkit-scrollbar { display: none; }
    .pill { flex-shrink: 0; padding: 7px 16px; border-radius: 20px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.5px; cursor: pointer; border: 1px solid var(--border); background: rgba(255,255,255,0.04); color: var(--muted); transition: all 0.15s; }
    .pill.active { background: var(--amber); color: #0C0C0E; border-color: var(--amber); }

    /* ── CARDS ── */
    .order-card, .popup-card, .request-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .order-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .order-id { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
    .order-email { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); font-weight: 500; margin-top: 2px; }
    .status-badge { flex-shrink: 0; padding: 4px 11px; border-radius: 20px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.8px; text-transform: uppercase; }
    .order-variety { font-family: 'Playfair Display', serif; font-size: 17px; color: var(--text); }
    .order-details { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--muted); }
    .order-meta { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
    .gift-badge { display: inline-block; background: rgba(201,151,58,0.15); color: var(--amber); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.8px; padding: 3px 9px; border-radius: 10px; text-transform: uppercase; }
    .action-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
    .action-btn { padding: 8px 16px; border-radius: 20px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.8px; text-transform: uppercase; cursor: pointer; border: 1px solid var(--border2); background: rgba(255,255,255,0.05); color: var(--text); transition: all 0.15s; }
    .action-btn:active { opacity: 0.7; }
    .action-btn.primary { background: var(--amber); color: #0C0C0E; border-color: var(--amber); }
    .action-btn.danger { background: transparent; color: rgba(220,100,100,0.85); border-color: rgba(220,80,80,0.3); }
    .action-btn.success { background: transparent; color: rgba(80,200,120,0.9); border-color: rgba(80,200,120,0.3); }

    /* ── ALERTS ── */
    .alert-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; justify-content: space-between; align-items: center; }
    .alert-name { font-family: 'Playfair Display', serif; font-size: 17px; color: var(--text); }
    .alert-farm { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 3px; }
    .stock-num { font-family: 'Playfair Display', serif; font-size: 28px; color: #E05A5A; }
    .stock-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-align: center; letter-spacing: 0.8px; text-transform: uppercase; }
    .slot-group { display: flex; flex-direction: column; gap: 8px; }
    .slot-heading { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--amber); padding: 0 4px; }

    /* ── EMPTY / LOADING ── */
    .empty { text-align: center; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 14px; font-style: italic; padding: 40px 0; }

    /* ── STATUS COLORS ── */
    .s-pending   { background: rgba(255,255,255,0.06); color: rgba(242,242,247,0.4); }
    .s-paid      { background: rgba(201,151,58,0.18); color: #D4A843; }
    .s-preparing { background: rgba(255,160,50,0.14); color: rgba(255,185,100,0.9); }
    .s-ready     { background: rgba(100,180,255,0.12); color: rgba(130,200,255,0.85); }
    .s-collected { background: rgba(100,200,120,0.1); color: rgba(130,210,140,0.75); }
    .s-cancelled { background: rgba(220,80,80,0.12); color: rgba(220,110,110,0.85); }
    .s-approved  { background: rgba(80,200,120,0.12); color: rgba(100,210,140,0.9); }
    .s-rejected  { background: rgba(220,80,80,0.12); color: rgba(220,110,110,0.85); }
    .s-passed    { background: rgba(255,255,255,0.06); color: rgba(242,242,247,0.4); }
    .s-accepted  { background: rgba(80,200,120,0.12); color: rgba(100,210,140,0.9); }
    .s-confirmed { background: rgba(80,200,120,0.15); color: rgba(100,210,140,0.95); }
    .s-waitlist  { background: rgba(201,151,58,0.18); color: #D4A843; }
    .s-completed { background: rgba(255,255,255,0.06); color: rgba(242,242,247,0.35); }

    /* ── MODAL ── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.72); z-index: 1000;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-box {
      background: var(--card); border: 1px solid var(--border2); border-radius: var(--radius);
      width: 100%; max-width: 520px; max-height: 80vh; display: flex; flex-direction: column;
      overflow: hidden;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .modal-title { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--text); }
    .modal-close {
      background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer;
      line-height: 1; padding: 4px 8px; transition: color 0.15s;
    }
    .modal-close:hover { color: var(--text); }
    .modal-body { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
    .modal-summary { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.5px; }
    .rsvp-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); gap: 12px; }
    .rsvp-row:last-child { border-bottom: none; }
    .rsvp-name { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); }

    /* ── ORDERS FILTER BAR ── */
    .orders-filter-bar {
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px 16px;
    }
    .orders-filter-bar select { flex: 1; min-width: 140px; max-width: 220px; }
    .orders-status-pills { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }

    /* ── FORM ── */
    .form-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .form-title { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--text); }
    .form-row { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
    .form-input, .form-select, .form-textarea {
      padding: 11px 14px; border: 1px solid var(--border2); border-radius: 10px;
      background: rgba(255,255,255,0.04); color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 14px; outline: none; transition: border-color 0.2s; width: 100%;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--amber); }
    .form-select option { background: #1a1a1c; }
    .form-textarea { resize: vertical; min-height: 80px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-check { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .form-check input { width: 18px; height: 18px; cursor: pointer; accent-color: var(--amber); }
    .form-check span { font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); }

    /* ── SECTION HEADING ── */
    .section-heading { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--amber); padding: 4px 0; margin-top: 4px; }

    /* ── POPUP CARD ── */
    .popup-name { font-family: 'Playfair Display', serif; font-size: 19px; color: var(--text); }
    .popup-meta { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
    .popup-stats { display: flex; gap: 16px; }
    .stat-block { display: flex; flex-direction: column; gap: 2px; }
    .stat-num { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--text); }
    .stat-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }

    /* ── STAT CARD (Revenue tab) ── */
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 16px; }
    .stat-value { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--text); }
    .stat-card .stat-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--amber); margin-top: 6px; }
    .stat-sub { font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* ── SECTION LABEL ── */
    .section-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--amber); padding: 4px 0; margin-bottom: 8px; }

    /* ── NOMINATION ROW ── */
    .nom-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .nom-row:last-child { border-bottom: none; }
    .nom-name { font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); }
    .nom-count { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--amber); }

    /* ── COLLAPSIBLE ── */
    .collapse-toggle { display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
    .collapse-body { display: none; margin-top: 12px; }
    .collapse-body.open { display: block; }
    .chevron { font-size: 12px; color: var(--muted); transition: transform 0.2s; }
    .chevron.open { transform: rotate(180deg); }

    /* ── PORTRAIT LIST ── */
    .portrait-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 12px; }
    .portrait-row:last-child { border-bottom: none; }
    .portrait-url { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .portrait-meta { font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--text); }
  </style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <div class="logo-block">
    <div class="logo-title">Box Fraise</div>
    <div class="logo-sub">Operator Access</div>
  </div>
  <div class="pin-card">
    <div class="pin-label">Enter PIN</div>
    <input id="pin-input" class="pin-input" type="password" inputmode="numeric" maxlength="20" placeholder="·····" autocomplete="off" />
    <button class="pin-btn" onclick="submitPin()">Enter</button>
    <div class="pin-error" id="pin-error"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="dash-header">
    <div class="dash-header-top">
      <div class="dash-header-left">
        <div class="dash-role" id="dash-role"></div>
        <div class="dash-title" id="dash-title"></div>
        <div class="dash-date" id="dash-date"></div>
      </div>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
    <div class="tab-row" id="tab-row"></div>
  </div>
  <div class="dash-body" id="dash-body"></div>
</div>

<script>
  const BASE = '';
  let currentRole = null;
  let currentPin = null;
  let currentFilter = 'all';
  let allOrders = [];
  let allPopups = [];
  let currentTab = 'orders';
  let allBusinesses = [];

  const CHOC = { guanaja_70:'Guanaja 70%', caraibe_66:'Caraïbe 66%', jivara_40:'Jivara 40%', ivoire_blanc:'Ivoire Blanc' };
  const FIN  = { plain:'Plain', fleur_de_sel:'Fleur de Sel', or_fin:'Or Fin' };
  const STATUS_NEXT  = { pending:null, paid:'preparing', preparing:'ready', ready:'collected', collected:null, cancelled:null };
  const STATUS_LABEL = { pending:'Pending', paid:'Paid', preparing:'Preparing', ready:'Ready', collected:'Collected', cancelled:'Cancelled' };

  function today() {
    return new Date().toLocaleDateString('en-CA', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  }
  function fmt(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('en-CA', { month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit' });
  }
  function fmtDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('en-CA', { month:'short', day:'numeric', year:'numeric' });
  }

  // ── PIN ──────────────────────────────────────────────
  async function submitPin() {
    const pin = document.getElementById('pin-input').value.trim();
    const err = document.getElementById('pin-error');
    err.textContent = '';
    if (!pin) return;

    const roles = [
      { role:'admin',       header:'X-Admin-PIN',       url:'/api/admin/orders' },
      { role:'chocolatier', header:'X-Chocolatier-PIN', url:'/api/chocolatier/orders' },
      { role:'supplier',    header:'X-Supplier-PIN',    url:'/api/supplier/alerts' },
    ];

    for (const { role, header, url } of roles) {
      const res = await fetch(BASE + url, { headers: { [header]: pin } });
      if (res.ok) {
        currentRole = role;
        currentPin = pin;
        document.getElementById('pin-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'flex';
        await loadDashboard(role, await res.json());
        return;
      }
    }
    err.textContent = 'Invalid PIN.';
    document.getElementById('pin-input').value = '';
  }

  function logout() {
    currentRole = currentPin = null;
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('pin-screen').style.display = 'flex';
    document.getElementById('pin-input').value = '';
    document.getElementById('pin-error').textContent = '';
  }

  // ── DASHBOARD ────────────────────────────────────────
  async function loadDashboard(role, data) {
    const roleLabel  = { admin:'Admin', chocolatier:'Chocolatier', supplier:'Supplier' };
    const titleLabel = { admin:'Orders', chocolatier:'Today', supplier:'Stock Alerts' };
    document.getElementById('dash-role').textContent  = roleLabel[role];
    document.getElementById('dash-title').textContent = titleLabel[role];
    document.getElementById('dash-date').textContent  = today();

    if (role === 'admin') {
      allOrders = data;
      // Load all businesses for popup + portrait forms
      const bRes = await fetch(BASE + '/api/businesses', { headers: { 'X-Admin-PIN': currentPin } });
      if (bRes.ok) allBusinesses = await bRes.json();
      buildAdminTabs();
      renderAdmin();
    } else if (role === 'chocolatier') {
      document.getElementById('tab-row').innerHTML = '';
      renderChocolatier(data);
    } else if (role === 'supplier') {
      document.getElementById('tab-row').innerHTML = '';
      renderSupplier(data);
    }
  }

  // ── ADMIN TABS ────────────────────────────────────────
  function buildAdminTabs() {
    const tabs = [
      { id:'orders',    label:'Orders' },
      { id:'slots',     label:'Slots' },
      { id:'varieties', label:'Varieties' },
      { id:'workers',   label:'Workers' },
      { id:'table',     label:'Table' },
    ];
    document.getElementById('tab-row').innerHTML = tabs.map(t =>
      `<div class="tab ${t.id === currentTab ? 'active' : ''}" onclick="switchTab('${t.id}')">${t.label}</div>`
    ).join('');
  }

  function switchTab(tab) {
    currentTab = tab;
    buildAdminTabs();
    if (tab === 'orders')    renderAdmin();
    else if (tab === 'slots')      renderSlotsTab();
    else if (tab === 'varieties')  renderVarietiesTab();
    else if (tab === 'workers')    renderWorkersTab();
    else if (tab === 'table')      renderTableTab();
  }

  // ── ORDERS TAB ────────────────────────────────────────
  let ordersLocationFilter = '';
  let ordersStatusFilter = 'all';
  let orderOffset = 0;
  const ORDER_LIMIT = 20;

  async function renderAdmin() {
    const body = document.getElementById('dash-body');
    orderOffset = 0;

    const collectionLocations = allBusinesses.filter(b => b.type === 'collection');
    const locationOpts = `<option value="">All Locations</option>` +
      collectionLocations.map(b => `<option value="${b.id}" ${ordersLocationFilter == b.id ? 'selected' : ''}>${b.name}</option>`).join('');

    const statuses = ['all','pending','paid','preparing','ready','collected','cancelled'];
    const statusPills = statuses.map(s =>
      `<div class="pill ${ordersStatusFilter===s?'active':''}" onclick="setOrdersStatus('${s}')">
        ${s==='all'?'All':STATUS_LABEL[s]||s}</div>`
    ).join('');

  async function loadBatchPreferencesSummary() {
    const el = document.getElementById('batch-preferences-body');
    if (!el) return;
    try {
      const res = await fetch(BASE + '/api/admin/batch-preferences', { headers: { 'X-Admin-PIN': currentPin } });
      if (!res.ok) { el.textContent = 'Failed to load.'; return; }
      const rows = await res.json();
      if (rows.length === 0) { el.textContent = 'No active batch preferences.'; return; }

      // Group by variety for totals and subscriber counts
      const totals = {};
      const counts = {};
      rows.forEach(r => {
        if (!totals[r.variety_name]) { totals[r.variety_name] = 0; counts[r.variety_name] = 0; }
        totals[r.variety_name] += r.quantity;
        counts[r.variety_name]++;
      });

      const summaryLine = Object.entries(totals)
        .map(([v, q]) => `<span style="color:var(--text);font-family:'DM Mono',monospace;">${v} × ${q} (${counts[v]} subscriber${counts[v] !== 1 ? 's' : ''})</span>`)
        .join('<span style="color:var(--muted);margin:0 8px;">·</span>');

      const rowsHtml = rows.map(r => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);">
          <div>
            <div style="font-size:13px;color:var(--text);">${r.display_name || r.email}</div>
            <div style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px;">${r.variety_name} · ${CHOC[r.chocolate]||r.chocolate} · ${FIN[r.finish]||r.finish}</div>
          </div>
          <div style="font-family:'DM Mono',monospace;font-size:15px;color:var(--text);flex-shrink:0;">× ${r.quantity}</div>
        </div>`).join('');

      el.innerHTML = `<div style="margin-bottom:10px;">${summaryLine}</div>${rowsHtml}`;
    } catch { el.textContent = 'Error loading batch preferences.'; }
  }

  async function loadProductionSummary() {
    const el = document.getElementById('production-body');
    if (!el) return;
    try {
      const res = await fetch(BASE + '/api/admin/orders?status=paid&limit=200', { headers: { 'X-Admin-PIN': currentPin } });
      if (!res.ok) { el.textContent = 'Failed to load.'; return; }
      const rows = await res.json();
      if (rows.length === 0) { el.innerHTML = '<span style="font-style:italic;">No paid orders today.</span>'; return; }

      const totals = {};
      rows.forEach(o => {
        const key = `${o.variety_name}|${o.chocolate}|${o.finish}`;
        if (!totals[key]) totals[key] = { variety_name: o.variety_name, chocolate: o.chocolate, finish: o.finish, qty: 0 };
        totals[key].qty += o.quantity;

      el.innerHTML = Object.values(totals).map((t: any) => `

  async function loadOrdersList() {
    const el = document.getElementById('orders-list');
    if (!el) return;
    el.innerHTML = '<div class="empty">Loading…</div>';
    orderOffset = 0;
    let url = BASE + '/api/admin/orders?';
    if (ordersStatusFilter && ordersStatusFilter !== 'all') url += `status=${ordersStatusFilter}&`;
    if (ordersLocationFilter) url += `location_id=${ordersLocationFilter}&`;
    url += `limit=${ORDER_LIMIT}&offset=0`;
    const res = await fetch(url, { headers: { 'X-Admin-PIN': currentPin } });
    if (!res.ok) { el.innerHTML = '<div class="empty">Failed to load orders.</div>'; return; }
    const orders = await res.json();
    allOrders = orders;
    if (orders.length === 0) {
      el.innerHTML = '<div class="empty">No orders.</div>';
      return;
    }
    el.innerHTML = orders.map(orderCardHtml).join('');
    if (orders.length === ORDER_LIMIT) {
      orderOffset = ORDER_LIMIT;
      el.insertAdjacentHTML('beforeend', `<button class="action-btn" id="load-more-btn" onclick="loadMoreOrders()" style="width:100%;margin-top:4px;">Load more</button>`);
    }

  async function loadMoreOrders() {
    const el = document.getElementById('orders-list');
    if (!el) return;
    const btn = document.getElementById('load-more-btn');
    if (btn) btn.textContent = 'Loading…';
    let url = BASE + '/api/admin/orders?';
    if (ordersStatusFilter && ordersStatusFilter !== 'all') url += `status=${ordersStatusFilter}&`;
    if (ordersLocationFilter) url += `location_id=${ordersLocationFilter}&`;
    url += `limit=${ORDER_LIMIT}&offset=${orderOffset}`;
    const res = await fetch(url, { headers: { 'X-Admin-PIN': currentPin } });
    if (!res.ok) { if (btn) btn.textContent = 'Load more'; return; }
    const orders = await res.json();
    allOrders = allOrders.concat(orders);
    if (btn) btn.remove();
    orders.forEach(o => { el.insertAdjacentHTML('beforeend', orderCardHtml(o)); });
    if (orders.length === ORDER_LIMIT) {
      orderOffset += ORDER_LIMIT;
      el.insertAdjacentHTML('beforeend', `<button class="action-btn" id="load-more-btn" onclick="loadMoreOrders()" style="width:100%;margin-top:4px;">Load more</button>`);
    }
  }

      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-PIN': currentPin },
      body: JSON.stringify({ token })

    if (!el) return;
    if (res.status === 404) { el.innerHTML = '<span style="color:#FF3B30">Token not found.</span>'; return; }
    const order = await res.json();
    const statusColor = order.status === 'collected' ? '#8E8E93' : '#34C759';
    el.innerHTML = `
      <div style="margin-top:12px;padding:12px;border:1px solid #2a2a2a;border-radius:8px;">

  function orderCardHtml(o) {
    const choc = CHOC[o.chocolate] || o.chocolate || '—';
    const fin  = FIN[o.finish] || o.finish || '—';
    const total = o.total_cents != null ? (o.total_cents / 100).toFixed(2) : '—';
    const next  = STATUS_NEXT[o.status];
    const slotMeta = o.slot_date && o.slot_time ? `${o.slot_date} · ${o.slot_time}` : (o.time_slot_id ? `Slot #${o.time_slot_id}` : '');
    const statusLabel = STATUS_LABEL[o.status] || o.status || '—';
    const collectedStyle = o.status === 'collected'
      ? ' style="background:rgba(142,142,147,0.14);color:#8E8E93;"'
      : '';
    const actions = [];
    // New admin-orders status actions
    if (o.status === 'pending')
      actions.push(`<button class="action-btn primary" onclick="updateOrderStatus(${o.id},'ready')">Mark Ready</button>`);
    if (o.status === 'ready')
      actions.push(`<button class="action-btn success" onclick="updateOrderStatus(${o.id},'completed')">Complete</button>`);
    // Legacy status advancement
    if (next && o.status !== 'pending' && o.status !== 'ready')
      actions.push(`<button class="action-btn primary" onclick="updateStatus(${o.id},'${next}')">Mark ${STATUS_LABEL[next]||next}</button>`);
    if (o.status !== 'cancelled' && o.status !== 'collected' && o.status !== 'completed')
      actions.push(`<button class="action-btn danger" onclick="updateStatus(${o.id},'cancelled')">Cancel</button>`);
    const ratingHtml = o.rating
      ? `<div style="font-family:'DM Mono',monospace;font-size:11px;color:#FFD700;margin-top:2px;">★ ${o.rating}/5${o.rating_note ? `<div style="color:var(--muted);font-style:italic;font-size:11px;font-family:'DM Sans',sans-serif;margin-top:1px;">${o.rating_note}</div>` : ''}</div>`
      : '';
    const excessCents = o.excess_amount_cents || 0;
    const excessHtml = excessCents > 0
      ? `<div style="display:flex;align-items:center;gap:8px;margin-top:2px;">
           <span style="background:rgba(201,151,58,0.22);color:#D4A843;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.8px;padding:3px 9px;border-radius:10px;text-transform:uppercase;flex-shrink:0;">TOKEN</span>
           <span style="font-family:'DM Mono',monospace;font-size:11px;color:#D4A843;">Excess: CA$${(excessCents/100).toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2})} — write NFC chip</span>
         </div>`
      : '';
    return `<div class="order-card" id="order-${o.id}">
      <div class="order-top">
        <div>
          <div class="order-id">#${o.id}${total !== '—' ? ' · CA$' + total : ''}</div>
          <div class="order-email">${o.customer_email || '—'}</div>
        </div>
        <div class="status-badge s-${o.status}"${collectedStyle}>${statusLabel}</div>
      </div>
      ${ratingHtml}
      ${excessHtml}
      <div><div class="order-variety">${o.variety_name||`Variety #${o.variety_id||'?'}`}</div>
        <div class="order-details">${choc} · ${fin} · ×${o.quantity||1}</div>
        ${o.is_gift?'<span class="gift-badge">Gift</span>':''}
      </div>
      ${slotMeta ? `<div class="order-meta">${slotMeta}</div>` : ''}
      <div class="order-meta">${fmt(o.created_at)}</div>
      ${actions.length?`<div class="action-row">${actions.join('')}</div>`:''}
    </div>`;
  }

  async function createSlot() {
    const msgEl = document.getElementById('slot-msg');
    const location_id = parseInt(document.getElementById('slot-loc').value);
    const date = document.getElementById('slot-date').value;
    const time = document.getElementById('slot-time').value.trim();
    const capacity = parseInt(document.getElementById('slot-capacity').value);
    if (!location_id || !date || !time || !capacity) {
      msgEl.style.color = '#E05A5A';
      msgEl.textContent = 'All fields are required.';
      return;
    }
    const res = await fetch(BASE + '/api/admin/time-slots', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-PIN': currentPin },
      body: JSON.stringify({ location_id, date, time, capacity }),
    });
    if (res.ok) {
      msgEl.style.color = 'rgba(80,200,120,0.9)';
      msgEl.textContent = 'Slot created.';
      document.getElementById('slot-time').value = '';
      document.getElementById('slot-capacity').value = '';
      setTimeout(() => { msgEl.textContent = ''; }, 2000);
    } else {
      const e = await res.json().catch(() => ({}));
      msgEl.style.color = '#E05A5A';
      msgEl.textContent = e.error || 'Failed.';
    }
  }

    const el = document.getElementById('slot-list');
    el.innerHTML = '<div class="empty">Loading…</div>';

    const date = document.getElementById('slot-view-date').value;

      fetch(BASE + '/api/admin/varieties/' + id, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'X-Admin-PIN': currentPin },
        body: JSON.stringify({ location_id, active, description, image_url }),
      }),
      isNaN(stock_remaining) ? Promise.resolve({ ok: true }) : fetch(BASE + '/api/admin/varieties/' + id + '/stock', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'X-Admin-PIN': currentPin },
        body: JSON.stringify({ stock_remaining }),
      }),
    ]);

    if (r1.ok && r2.ok) {
      const card = document.getElementById('variety-card-' + id);
      if (card) {
        const badge = card.querySelector('span[data-active]');
        if (badge) {
          badge.style.color = active ? 'rgba(80,200,120,0.9)' : '#E05A5A';
          badge.textContent = active ? 'ACTIVE' : 'INACTIVE';
        }
      }
      const btn = card?.querySelector('.save-btn-' + id);
      if (btn) { btn.textContent = 'Saved ✓'; setTimeout(() => { btn.textContent = 'Save'; }, 1500); }
    } else {
      alert('Failed to update variety.');
    }
  }

  // ── WORKERS TAB ──────────────────────────────────────
  async function renderWorkersTab() {
    const body = document.getElementById('dash-body');
    body.innerHTML = '<div class="empty">Loading…</div>';
    try {
      const res = await fetch(BASE + '/api/admin/worker-requests', {
        headers: { 'X-Admin-PIN': currentPin },
      });
      if (!res.ok) { body.innerHTML = '<div class="empty">Failed to load.</div>'; return; }
      const all = await res.json();

      const pending = all.filter(r => r.status === 'pending');
      const approved = all.filter(r => r.status === 'approved');
      const denied = all.filter(r => r.status === 'denied');

      const renderRow = (r, actions) => `
        <div style="display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);gap:12px;">
          <div style="flex:1;">
            <div style="font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);">${r.display_name || 'Unknown'}</div>
            <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-top:2px;">${r.user_code || ''} · ${r.location_name || 'Unknown location'}</div>
            <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:2px;">${new Date(r.requested_at).toLocaleDateString('en-CA')}</div>
          </div>
          <div style="display:flex;gap:8px;">${actions}</div>
        </div>`;

      const approveBtn = (id) => `<button onclick="approveWorker(${id})" style="background:var(--amber);color:#000;border:none;border-radius:8px;padding:6px 14px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;">Approve</button>`;
      const denyBtn = (id) => `<button onclick="denyWorker(${id})" style="background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;">Deny</button>`;
      const revokeBtn = (id) => `<button onclick="revokeWorker(${id})" style="background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;">Revoke</button>`;

      body.innerHTML = `
        <div class="section-label">Pending Requests</div>
        ${pending.length === 0 ? '<div class="empty" style="margin-bottom:24px;">No pending requests.</div>' : pending.map(r => renderRow(r, approveBtn(r.id) + denyBtn(r.id))).join('')}
        <div class="section-label" style="margin-top:24px;">Active Workers</div>
        ${approved.length === 0 ? '<div class="empty" style="margin-bottom:24px;">No active workers.</div>' : approved.map(r => renderRow(r, revokeBtn(r.id))).join('')}
        ${denied.length > 0 ? `<div class="section-label" style="margin-top:24px;">Denied</div>${denied.map(r => renderRow(r, approveBtn(r.id))).join('')}` : ''}
      `;
    } catch {
      body.innerHTML = '<div class="empty">Error loading workers.</div>';
    }
  }

  async function approveWorker(id) {
    await fetch(`${BASE}/api/admin/worker-requests/${id}/approve`, { method: 'POST', headers: { 'X-Admin-PIN': currentPin } });
    renderWorkersTab();
  }

  async function denyWorker(id) {
    await fetch(`${BASE}/api/admin/worker-requests/${id}/deny`, { method: 'POST', headers: { 'X-Admin-PIN': currentPin } });
    renderWorkersTab();
  }

  async function revokeWorker(id) {
    if (!confirm('Revoke this worker\'s access?')) return;
    await fetch(`${BASE}/api/admin/worker-requests/${id}`, { method: 'DELETE', headers: { 'X-Admin-PIN': currentPin } });
    renderWorkersTab();
  }

  // ── TABLE TAB ──────────────────────────────────────────
  async function renderTableTab() {
    const body = document.getElementById('dash-body');
    body.innerHTML = '<div class="empty">loading —</div>';
    try {
      const [eventsRes, instructorsRes, bookingsRes] = await Promise.all([
        fetch(`${BASE}/api/table/events`, { headers: { 'X-Admin-PIN': currentPin } }),
        fetch(`${BASE}/api/table/instructors`, { headers: { 'X-Admin-PIN': currentPin } }),
        fetch(`${BASE}/api/table/bookings`, { headers: { 'X-Admin-PIN': currentPin } }),
      ]);
      const events = eventsRes.ok ? await eventsRes.json() : [];
      const instructors = instructorsRes.ok ? await instructorsRes.json() : [];
      const bookings = bookingsRes.ok ? await bookingsRes.json() : [];

      const formatDate = iso => {
        if (!iso) return 'date tbd';
        const d = new Date(iso);
        return d.toLocaleDateString('en-CA', { weekday:'short', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
      };

      const statusColor = s => s === 'confirmed' ? 'var(--green)' : s === 'refunded' ? 'var(--muted)' : 'var(--yellow, #f0a500)';

      body.innerHTML = `
        <div class="section-label">Instructors</div>
        <div style="margin-bottom:12px;">
          ${instructors.length === 0 ? '<div class="empty">No instructors yet.</div>' : instructors.map(i => `
            <div class="order-row" style="display:flex;justify-content:space-between;align-items:center;">
              <div>
                <div style="font-size:13px;font-family:'DM Mono',monospace;">${i.name}</div>
                ${i.bio ? `<div style="font-size:11px;color:var(--muted);margin-top:2px;">${i.bio.slice(0,80)}${i.bio.length>80?'…':''}</div>` : ''}
              </div>
              <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);">id ${i.id}</div>
            </div>
          `).join('')}
        </div>

        <form id="add-instructor-form" style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px;">
          <div class="section-label" style="margin-top:8px;">Add Instructor</div>
          <input class="pin-input" style="font-size:13px;letter-spacing:0;text-align:left;padding:10px 12px;" placeholder="name" id="i-name" required />
          <input class="pin-input" style="font-size:13px;letter-spacing:0;text-align:left;padding:10px 12px;" placeholder="bio (optional)" id="i-bio" />
          <input class="pin-input" style="font-size:13px;letter-spacing:0;text-align:left;padding:10px 12px;" placeholder="photo url (optional)" id="i-photo" />
          <button type="submit" class="pin-btn" style="padding:10px;">Add Instructor</button>
        </form>

        <div class="section-label">Events</div>
        <div style="margin-bottom:12px;">
          ${events.length === 0 ? '<div class="empty">No events yet.</div>' : events.map(e => `
            <div class="order-row" style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;">
              <div style="flex:1;min-width:0;">
                <div style="font-size:13px;font-family:'DM Mono',monospace;">${e.title}</div>
                <div style="font-size:11px;color:var(--muted);margin-top:2px;">${formatDate(e.event_date)} · ${e.venue_name} · ${e.instructor_name}</div>
                <div style="font-size:11px;color:var(--muted);margin-top:1px;">CA$${(e.price_cents/100).toFixed(0)} · ${e.seats_taken}/${e.capacity} seats</div>
                ${e.date_tbd ? `
                  <form onsubmit="confirmEventDate(event, ${e.id})" style="display:flex;gap:6px;margin-top:8px;">
                    <input type="datetime-local" id="confirm-date-${e.id}" class="pin-input" style="font-size:11px;letter-spacing:0;text-align:left;padding:6px 8px;flex:1;" required />
                    <button type="submit" class="pin-btn" style="padding:6px 12px;font-size:11px;">Set date</button>
                  </form>
                ` : ''}
              </div>
              <button onclick="toggleEvent(${e.id}, ${!e.active})" style="background:${e.active ? 'rgba(80,200,120,0.15)' : 'rgba(220,80,80,0.15)'};border:1px solid ${e.active ? 'rgba(80,200,120,0.4)' : 'rgba(220,80,80,0.4)'};color:${e.active ? 'var(--green)' : 'var(--red)'};font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:6px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;">
                ${e.active ? 'active' : 'inactive'}
              </button>
            </div>
          `).join('')}
        </div>

        <form id="add-event-form" style="display:flex;flex-direction:column;gap:8px;margin-bottom:32px;">
          <div class="section-label" style="margin-top:8px;">Add Event</div>
          <select id="e-instructor" class="pin-input" style="font-size:13px;letter-spacing:0;text-align:left;padding:10px 12px;cursor:pointer;">
            <option value="">select instructor</option>
            ${instructors.map(i => `<option value="${i.id}">${i.name}</option>`).join('')}
          </select>
          <input class="pin-input" style="font-size:13px;letter-spacing:0;text-align:left;padding:10px 12px;" placeholder="title (e.g. knife skills)" id="e-title" required />
          <input class="pin-input" style="font-size:13px;letter-spacing:0;text-align:left;padding:10px 12px;" placeholder="venue name" id="e-venue" required />
          <input class="pin-input" style="font-size:13px;letter-spacing:0;text-align:left;padding:10px 12px;" placeholder="venue address (optional)" id="e-address" />
          <input class="pin-input" style="font-size:13px;letter-spacing:0;text-align:left;padding:10px 12px;" placeholder="date & time — leave blank for TBD" id="e-date" type="datetime-local" />
          <input class="pin-input" style="font-size:13px;letter-spacing:0;text-align:left;padding:10px 12px;" placeholder="price in CAD (e.g. 120)" id="e-price" type="number" min="1" required />
          <input class="pin-input" style="font-size:13px;letter-spacing:0;text-align:left;padding:10px 12px;" placeholder="capacity (default 12)" id="e-capacity" type="number" min="1" value="12" />
          <input class="pin-input" style="font-size:13px;letter-spacing:0;text-align:left;padding:10px 12px;" placeholder="duration in minutes (default 120)" id="e-duration" type="number" min="30" value="120" />
          <textarea class="pin-input" style="font-size:13px;letter-spacing:0;text-align:left;padding:10px 12px;resize:vertical;min-height:80px;font-family:'DM Mono',monospace;" placeholder="description (optional)" id="e-desc"></textarea>
          <button type="submit" class="pin-btn" style="padding:10px;">Add Event</button>
        </form>

        <div class="section-label">Bookings</div>
        <div style="margin-bottom:12px;">
          ${bookings.length === 0 ? '<div class="empty">No bookings yet.</div>' : bookings.map(b => {
            const ev = events.find(e => e.id === b.event_id);
            return `
            <div class="order-row" style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;">
              <div>
                <div style="font-size:13px;font-family:'DM Mono',monospace;">${b.name}</div>
                <div style="font-size:11px;color:var(--muted);margin-top:2px;">${b.email} · ${b.seats} seat${b.seats>1?'s':''} · CA$${(b.total_cents/100).toFixed(0)}</div>
                <div style="font-size:11px;color:var(--muted);margin-top:1px;">${ev ? ev.title : 'event #'+b.event_id}</div>
              </div>
              <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
                <div style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:${statusColor(b.status)};">${b.status}</div>
                ${b.status === 'confirmed' ? `<button onclick="refundBooking(${b.id})" style="background:rgba(220,80,80,0.1);border:1px solid rgba(220,80,80,0.3);color:var(--red);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:20px;cursor:pointer;">refund</button>` : ''}
              </div>
            </div>
          `}).join('')}
        </div>
      `;

      document.getElementById('add-instructor-form').addEventListener('submit', async e => {
        e.preventDefault();
        const name = document.getElementById('i-name').value.trim();
        const bio = document.getElementById('i-bio').value.trim();
        const photo_url = document.getElementById('i-photo').value.trim();
        if (!name) return;
        const res = await fetch(`${BASE}/api/table/instructors`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-PIN': currentPin },
          body: JSON.stringify({ name, bio: bio || null, photo_url: photo_url || null }),
        });
        if (res.ok) renderTableTab();
        else alert('Failed to add instructor.');
      });

      document.getElementById('add-event-form').addEventListener('submit', async e => {
        e.preventDefault();
        const instructor_id = parseInt(document.getElementById('e-instructor').value);
        const title = document.getElementById('e-title').value.trim();
        const venue_name = document.getElementById('e-venue').value.trim();
        const venue_address = document.getElementById('e-address').value.trim();
        const event_date = document.getElementById('e-date').value;
        const price_cents = Math.round(parseFloat(document.getElementById('e-price').value) * 100);
        const capacity = parseInt(document.getElementById('e-capacity').value) || 12;
        const duration_minutes = parseInt(document.getElementById('e-duration').value) || 120;
        const description = document.getElementById('e-desc').value.trim();
        if (!instructor_id || !title || !venue_name || !price_cents) return alert('Fill in required fields.');
        const res = await fetch(`${BASE}/api/table/events`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-PIN': currentPin },
          body: JSON.stringify({ instructor_id, title, venue_name, venue_address: venue_address || null, event_date: event_date || null, price_cents, capacity, duration_minutes, description: description || null }),
        });
        if (res.ok) renderTableTab();
        else alert('Failed to add event.');
      });

    } catch {
      document.getElementById('dash-body').innerHTML = '<div class="empty">Error loading table data.</div>';
    }
  }

  async function toggleEvent(id, active) {
    await fetch(`${BASE}/api/table/events/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'X-Admin-PIN': currentPin },
      body: JSON.stringify({ active }),
    });
    renderTableTab();
  }

  async function confirmEventDate(e, id) {
    e.preventDefault();
    const event_date = document.getElementById(`confirm-date-${id}`).value;
    if (!event_date) return;
    await fetch(`${BASE}/api/table/events/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'X-Admin-PIN': currentPin },
      body: JSON.stringify({ event_date }),
    });
    renderTableTab();
  }

  async function refundBooking(id) {
    if (!confirm('Issue full refund for this booking?')) return;
    const res = await fetch(`${BASE}/api/table/bookings/${id}/refund`, {
      method: 'POST',
      headers: { 'X-Admin-PIN': currentPin },
    });
    if (res.ok) renderTableTab();
    else alert('Refund failed.');
  }
</script>
</body>
</html>
