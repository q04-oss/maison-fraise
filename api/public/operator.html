<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maison Fraise — Operator</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0C0C0E;
      --bg2:     #0A0A0C;
      --card:    rgba(28,28,30,0.95);
      --card2:   #1A1A1C;
      --amber:   #C9973A;
      --amber2:  #D4A843;
      --text:    #F2F2F7;
      --muted:   rgba(242,242,247,0.42);
      --border:  rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.13);
      --red:     rgba(220,80,80,0.9);
      --radius:  14px;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── PIN SCREEN ─────────────────────────────────── */
    #pin-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      gap: 32px;
      background: var(--bg2);
      position: relative;
      overflow: hidden;
    }

    /* Subtle grid behind PIN */
    #pin-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.016) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.016) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 0%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 0%, transparent 100%);
      pointer-events: none;
    }

    /* Amber glow */
    #pin-screen::after {
      content: '';
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,151,58,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .logo-block {
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .logo-title {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 32px;
      color: var(--text);
      letter-spacing: 0.3px;
    }

    .logo-sub {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--amber);
      margin-top: 8px;
    }

    .pin-card {
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 28px 24px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      z-index: 1;
    }

    .pin-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .pin-input {
      width: 100%;
      padding: 14px 16px;
      font-size: 22px;
      letter-spacing: 8px;
      border: 1px solid var(--border2);
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      color: var(--text);
      outline: none;
      text-align: center;
      font-family: 'DM Mono', monospace;
      transition: border-color 0.2s;
    }
    .pin-input:focus { border-color: var(--amber); }
    .pin-input::placeholder { opacity: 0.3; }

    .pin-btn {
      width: 100%;
      padding: 16px;
      background: var(--amber);
      color: #0C0C0E;
      border: none;
      border-radius: 30px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .pin-btn:active { opacity: 0.8; }

    .pin-error {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: #E05A5A;
      text-align: center;
      min-height: 18px;
      letter-spacing: 0.5px;
    }

    /* ── DASHBOARD SHELL ────────────────────────────── */
    #dashboard { display: none; flex-direction: column; min-height: 100vh; }

    .dash-header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 52px 20px 20px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
    }

    .dash-header-left { display: flex; flex-direction: column; gap: 4px; }

    .dash-role {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--amber);
    }

    .dash-title {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      color: var(--text);
    }

    .dash-date {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      letter-spacing: 0.3px;
    }

    .logout-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 9px 16px;
      border-radius: 20px;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
    }
    .logout-btn:hover { color: var(--text); border-color: var(--border2); }

    .dash-body { flex: 1; padding: 20px 16px; display: flex; flex-direction: column; gap: 12px; }

    /* ── FILTER PILLS ───────────────────────────────── */
    .filter-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }

    .pill {
      flex-shrink: 0;
      padding: 7px 16px;
      border-radius: 20px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.5px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      transition: all 0.15s;
    }
    .pill.active {
      background: var(--amber);
      color: #0C0C0E;
      border-color: var(--amber);
    }

    /* ── ORDER CARD ─────────────────────────────────── */
    .order-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .order-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }

    .order-id {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    .order-email {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
      margin-top: 2px;
    }

    .status-badge {
      flex-shrink: 0;
      padding: 4px 11px;
      border-radius: 20px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .order-items { display: flex; flex-direction: column; gap: 4px; }

    .order-variety {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      color: var(--text);
    }

    .order-details {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--muted);
    }

    .order-meta {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.3px;
    }

    .gift-badge {
      display: inline-block;
      background: rgba(201,151,58,0.15);
      color: var(--amber);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.8px;
      padding: 3px 9px;
      border-radius: 10px;
      text-transform: uppercase;
    }

    .action-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }

    .action-btn {
      padding: 8px 16px;
      border-radius: 20px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid var(--border2);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      transition: all 0.15s;
    }
    .action-btn:active { opacity: 0.7; }

    .action-btn.primary {
      background: var(--amber);
      color: #0C0C0E;
      border-color: var(--amber);
    }

    .action-btn.danger {
      background: transparent;
      color: rgba(220,100,100,0.85);
      border-color: rgba(220,80,80,0.3);
    }
    .action-btn.danger:active { background: rgba(220,80,80,0.1); }

    /* ── ALERT CARD ─────────────────────────────────── */
    .alert-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .alert-name {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      color: var(--text);
    }

    .alert-farm {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
    }

    .stock-num {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: #E05A5A;
    }

    .stock-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    /* ── SLOT GROUP ─────────────────────────────────── */
    .slot-group { display: flex; flex-direction: column; gap: 8px; }

    .slot-heading {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--amber);
      padding: 0 4px;
    }

    /* ── EMPTY / LOADING ────────────────────────────── */
    .empty {
      text-align: center;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-style: italic;
      padding: 40px 0;
    }

    /* ── STATUS COLORS ──────────────────────────────── */
    .s-pending   { background: rgba(255,255,255,0.06); color: rgba(242,242,247,0.4); }
    .s-paid      { background: rgba(201,151,58,0.18); color: #D4A843; }
    .s-preparing { background: rgba(255,160,50,0.14); color: rgba(255,185,100,0.9); }
    .s-ready     { background: rgba(100,180,255,0.12); color: rgba(130,200,255,0.85); }
    .s-collected { background: rgba(100,200,120,0.1); color: rgba(130,210,140,0.75); }
    .s-cancelled { background: rgba(220,80,80,0.12); color: rgba(220,110,110,0.85); }
  </style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <div class="logo-block">
    <div class="logo-title">Maison Fraise</div>
    <div class="logo-sub">Operator Access</div>
  </div>
  <div class="pin-card">
    <div class="pin-label">Enter PIN</div>
    <input id="pin-input" class="pin-input" type="password" inputmode="numeric" maxlength="20" placeholder="·····" autocomplete="off" />
    <button class="pin-btn" onclick="submitPin()">Enter</button>
    <div class="pin-error" id="pin-error"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="dash-header">
    <div class="dash-header-left">
      <div class="dash-role" id="dash-role"></div>
      <div class="dash-title" id="dash-title"></div>
      <div class="dash-date" id="dash-date"></div>
    </div>
    <button class="logout-btn" onclick="logout()">Sign out</button>
  </div>
  <div class="dash-body" id="dash-body"></div>
</div>

<script>
  const BASE = '';
  let currentRole = null;
  let currentPin = null;
  let currentFilter = 'all';
  let allOrders = [];
  let varieties = {};

  const CHOCOLATE_NAMES = {
    guanaja_70: 'Guanaja 70%',
    caraibe_66: 'Caraïbe 66%',
    jivara_40: 'Jivara 40%',
    ivoire_blanc: 'Ivoire Blanc',
  };
  const FINISH_NAMES = {
    plain: 'Plain',
    fleur_de_sel: 'Fleur de Sel',
    or_fin: 'Or Fin',
  };
  const STATUS_NEXT = {
    pending: null,
    paid: 'preparing',
    preparing: 'ready',
    ready: 'collected',
    collected: null,
    cancelled: null,
  };
  const STATUS_LABEL = {
    pending: 'Pending',
    paid: 'Paid',
    preparing: 'Preparing',
    ready: 'Ready',
    collected: 'Collected',
    cancelled: 'Cancelled',
  };

  function today() {
    const d = new Date();
    return d.toLocaleDateString('en-CA', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  }

  async function submitPin() {
    const pin = document.getElementById('pin-input').value.trim();
    const err = document.getElementById('pin-error');
    err.textContent = '';
    if (!pin) return;

    // Try each role in order
    const roles = [
      { role: 'admin',       header: 'X-Admin-PIN',       url: '/api/admin/orders' },
      { role: 'chocolatier', header: 'X-Chocolatier-PIN', url: '/api/chocolatier/orders' },
      { role: 'supplier',    header: 'X-Supplier-PIN',    url: '/api/supplier/alerts' },
    ];

    for (const { role, header, url } of roles) {
      const res = await fetch(BASE + url, { headers: { [header]: pin } });
      if (res.ok) {
        currentRole = role;
        currentPin = pin;
        document.getElementById('pin-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'flex';
        await loadDashboard(role, await res.json());
        return;
      }
    }

    err.textContent = 'Invalid PIN.';
    document.getElementById('pin-input').value = '';
  }

  function logout() {
    currentRole = null;
    currentPin = null;
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('pin-screen').style.display = 'flex';
    document.getElementById('pin-input').value = '';
    document.getElementById('pin-error').textContent = '';
  }

  async function loadDashboard(role, data) {
    const roleLabel = { admin: 'Admin', chocolatier: 'Chocolatier', supplier: 'Supplier' };
    const titleLabel = { admin: 'Orders', chocolatier: 'Today', supplier: 'Stock Alerts' };

    document.getElementById('dash-role').textContent = roleLabel[role];
    document.getElementById('dash-title').textContent = titleLabel[role];
    document.getElementById('dash-date').textContent = today();

    if (role === 'admin') {
      allOrders = data;
      renderAdmin();
    } else if (role === 'chocolatier') {
      renderChocolatier(data);
    } else if (role === 'supplier') {
      renderSupplier(data);
    }
  }

  // ── ADMIN ──────────────────────────────────────────

  function renderAdmin() {
    const body = document.getElementById('dash-body');
    const statuses = ['all', 'pending', 'paid', 'preparing', 'ready', 'collected', 'cancelled'];
    const filtered = currentFilter === 'all' ? allOrders : allOrders.filter(o => o.status === currentFilter);

    const filterHtml = `
      <div class="filter-row">
        ${statuses.map(s => `
          <div class="pill ${currentFilter === s ? 'active' : ''}" onclick="setFilter('${s}')">
            ${s === 'all' ? `All (${allOrders.length})` : STATUS_LABEL[s]}
          </div>
        `).join('')}
      </div>
    `;

    const ordersHtml = filtered.length === 0
      ? '<div class="empty">No orders.</div>'
      : filtered.map(o => orderCardHtml(o)).join('');

    body.innerHTML = filterHtml + ordersHtml;
  }

  function setFilter(f) {
    currentFilter = f;
    renderAdmin();
  }

  function orderCardHtml(o) {
    const choc = CHOCOLATE_NAMES[o.chocolate] || o.chocolate;
    const fin = FINISH_NAMES[o.finish] || o.finish;
    const total = (o.total_cents / 100).toFixed(2);
    const next = STATUS_NEXT[o.status];
    const slotMeta = o.slot_date && o.slot_time ? `${o.slot_date} · ${o.slot_time}` : `Slot #${o.time_slot_id}`;

    const actions = [];
    if (next) {
      actions.push(`<button class="action-btn primary" onclick="updateStatus(${o.id}, '${next}')">Mark ${STATUS_LABEL[next]}</button>`);
    }
    if (o.status !== 'cancelled' && o.status !== 'collected') {
      actions.push(`<button class="action-btn danger" onclick="updateStatus(${o.id}, 'cancelled')">Cancel</button>`);
    }

    return `
      <div class="order-card" id="order-${o.id}">
        <div class="order-top">
          <div>
            <div class="order-id">#${o.id} · CA$${total}</div>
            <div class="order-email">${o.customer_email}</div>
          </div>
          <div class="status-badge s-${o.status}">${STATUS_LABEL[o.status]}</div>
        </div>
        <div class="order-items">
          <div class="order-variety">${o.variety_name || `Variety #${o.variety_id}`}</div>
          <div class="order-details">${choc} · ${fin} · ×${o.quantity}</div>
          ${o.is_gift ? '<span class="gift-badge">Gift</span>' : ''}
        </div>
        <div class="order-meta">${slotMeta}</div>
        ${actions.length ? `<div class="action-row">${actions.join('')}</div>` : ''}
      </div>
    `;
  }

  async function updateStatus(id, status) {
    const res = await fetch(`${BASE}/api/admin/orders/${id}/status`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'X-Admin-PIN': currentPin },
      body: JSON.stringify({ status }),
    });
    if (res.ok) {
      const updated = await res.json();
      allOrders = allOrders.map(o => o.id === id ? updated : o);
      renderAdmin();
    }
  }

  // ── CHOCOLATIER ────────────────────────────────────

  function renderChocolatier(rows) {
    const body = document.getElementById('dash-body');
    if (!rows.length) {
      body.innerHTML = '<div class="empty">No paid orders for today.</div>';
      return;
    }

    // Group by slot time
    const groups = {};
    rows.forEach(({ order: o, slot: s }) => {
      const key = s.time;
      if (!groups[key]) groups[key] = [];
      groups[key].push({ o, s });
    });

    const html = Object.entries(groups).sort(([a], [b]) => a.localeCompare(b)).map(([time, items]) => `
      <div class="slot-group">
        <div class="slot-heading">${time}</div>
        ${items.map(({ o }) => {
          const choc = CHOCOLATE_NAMES[o.chocolate] || o.chocolate;
          const fin = FINISH_NAMES[o.finish] || o.finish;
          return `
            <div class="order-card">
              <div class="order-top">
                <div>
                  <div class="order-id">#${o.id}</div>
                  <div class="order-email">${o.customer_email}</div>
                </div>
                <div class="order-details" style="text-align:right;font-size:13px;">×${o.quantity}</div>
              </div>
              <div class="order-items">
                <div class="order-details">${choc} · ${fin}</div>
                ${o.is_gift ? '<span class="gift-badge">Gift</span>' : ''}
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `).join('');

    body.innerHTML = html;
  }

  // ── SUPPLIER ───────────────────────────────────────

  function renderSupplier(items) {
    const body = document.getElementById('dash-body');
    if (!items.length) {
      body.innerHTML = '<div class="empty">All varieties are well stocked.</div>';
      return;
    }

    body.innerHTML = items.map(v => `
      <div class="alert-card">
        <div>
          <div class="alert-name">${v.name}</div>
          <div class="alert-farm">${[v.source_farm, v.source_location].filter(Boolean).join(', ') || '—'}</div>
        </div>
        <div style="text-align:center;">
          <div class="stock-num">${v.stock_remaining}</div>
          <div class="stock-label">remaining</div>
        </div>
      </div>
    `).join('');
  }

  // Enter key on PIN input
  document.getElementById('pin-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitPin();
  });
</script>
</body>
</html>
