<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fraise.box / device</title>
<style>
  :root {
    --bone: #f4efe6;
    --oxblood: #4a1519;
    --oxblood-dark: #2e0c0f;
    --brass: #b8874a;
    --brass-dark: #6b4a22;
    --screen-bg: #c8c4b8;
    --screen-ink: #1a1814;
    --screen-dim: #7a7668;
    --ui-muted: #888278;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--bone);
    font-family: ui-monospace, "SF Mono", "Menlo", "Consolas", monospace;
    color: var(--oxblood-dark);
    height: 100%;
    width: 100%;
    overflow: hidden;
  }

  body {
    display: grid;
    grid-template-rows: auto 1fr auto;
    min-height: 100vh;
    padding: 1.25rem 1.5rem;
    gap: 1rem;
  }

  .masthead {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
  }

  .masthead .sub { color: var(--ui-muted); }

  .masthead a {
    color: var(--oxblood);
    text-decoration: none;
    border-bottom: 1px solid rgba(74, 21, 25, 0.2);
    padding-bottom: 1px;
  }

  .masthead a:hover { border-bottom-color: var(--oxblood); }

  .masthead .links { display: flex; gap: 1.25rem; }

  .device-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
    min-width: 0;
    padding-right: 24px; /* room for the dial */
  }

  .device {
    position: relative;
    background: linear-gradient(145deg, var(--oxblood) 0%, var(--oxblood-dark) 100%);
    border-radius: 20px;
    padding: clamp(18px, 2.5vmin, 36px);
    padding-bottom: clamp(40px, 6vmin, 80px);
    box-shadow:
      0 20px 40px rgba(46, 12, 15, 0.25),
      inset 0 1px 0 rgba(255, 240, 220, 0.06),
      inset 0 -2px 4px rgba(0, 0, 0, 0.4);
    display: flex;
    flex-direction: column;
    aspect-ratio: 3 / 4;
    height: 100%;
    max-height: 100%;
    max-width: 100%;
  }

  @media (min-aspect-ratio: 3/4) {
    .device { width: auto; height: 100%; }
  }

  @media (max-aspect-ratio: 3/4) {
    .device { width: 100%; height: auto; }
  }

  .screw {
    position: absolute;
    width: clamp(8px, 1.2vmin, 14px);
    height: clamp(8px, 1.2vmin, 14px);
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #5a5048, #2a2420);
    box-shadow: inset 0 1px 1px rgba(0,0,0,0.6), 0 1px 0 rgba(255,240,220,0.1);
  }
  .screw::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 15%;
    right: 15%;
    height: 1px;
    background: #1a1612;
    transform: translateY(-50%);
  }
  .screw.tl { top: 10px; left: 10px; }
  .screw.tr { top: 10px; right: 10px; }
  .screw.bl { bottom: 10px; left: 10px; }
  .screw.br { bottom: 10px; right: 10px; }

  .screen {
    background: var(--screen-bg);
    border-radius: 6px;
    padding: clamp(10px, 2vmin, 22px);
    flex: 1;
    box-shadow:
      inset 0 2px 6px rgba(0, 0, 0, 0.35),
      inset 0 -1px 2px rgba(255, 255, 255, 0.1);
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }

  .screen::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.015) 0px,
        rgba(0,0,0,0.015) 1px,
        transparent 1px,
        transparent 3px
      );
    pointer-events: none;
    border-radius: 6px;
  }

  .grid {
    font-family: ui-monospace, "SF Mono", "Menlo", "Consolas", monospace;
    line-height: 1.35;
    color: var(--screen-ink);
    white-space: pre;
    letter-spacing: 0.02em;
    user-select: none;
    position: relative;
    z-index: 1;
    margin: 0;
  }

  .controls {
    position: absolute;
    bottom: clamp(12px, 2vmin, 24px);
    left: 0;
    right: 0;
    padding: 0 clamp(20px, 3vmin, 40px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: clamp(0.65rem, 1.1vmin, 0.8rem);
  }

  .control-hint { color: rgba(244, 239, 230, 0.45); letter-spacing: 0.05em; }
  .fraise-mark { color: rgba(244, 239, 230, 0.35); letter-spacing: 0.12em; }

  .dial-container {
    position: absolute;
    right: calc(-1 * clamp(18px, 2.5vmin, 26px));
    top: 38%;
    transform: translateY(-50%);
  }

  .dial {
    width: clamp(32px, 4vmin, 48px);
    height: clamp(90px, 14vmin, 140px);
    background: linear-gradient(90deg, var(--brass-dark) 0%, var(--brass) 50%, var(--brass-dark) 100%);
    border-radius: 6px;
    position: relative;
    cursor: grab;
    box-shadow:
      2px 0 6px rgba(0,0,0,0.3),
      inset 1px 0 0 rgba(255,220,160,0.3),
      inset -1px 0 0 rgba(40,20,0,0.4);
    touch-action: none;
  }

  .dial:active { cursor: grabbing; }

  .dial::before {
    content: "";
    position: absolute;
    inset: 6px 4px;
    background:
      repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.25) 0px,
        rgba(0,0,0,0.25) 1px,
        transparent 1px,
        transparent 3px
      );
    border-radius: 3px;
    pointer-events: none;
  }

  .dial-indicator {
    position: absolute;
    left: 50%;
    top: 4px;
    width: 2px;
    height: 4px;
    background: rgba(255,255,220,0.7);
    transform: translateX(-50%);
    border-radius: 1px;
  }

  .bottom-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.7rem;
    color: var(--ui-muted);
    letter-spacing: 0.03em;
  }

  .bottom-bar kbd {
    display: inline-block;
    padding: 1px 5px;
    background: rgba(74, 21, 25, 0.08);
    border: 1px solid rgba(74, 21, 25, 0.2);
    border-radius: 3px;
    font-family: inherit;
    font-size: 0.65rem;
    margin: 0 1px;
  }

  .bottom-bar .hint { flex: 1; text-align: center; }

  @media (max-width: 640px) {
    body { padding: 0.75rem 1rem; gap: 0.5rem; }
    .masthead .sub { display: none; }
    .bottom-bar { font-size: 0.6rem; }
    .bottom-bar .hint { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>

<header class="masthead">
  <span>box fraise / device</span>
  <span class="sub">virtual fraise.box — stage 1 preview</span>
  <span class="links">
    <a href="/">← fraise.box</a>
    <a href="/paper">paper</a>
  </span>
</header>

<div class="device-wrap">
  <div class="device" role="application" aria-label="Virtual fraise.box device">
    <div class="screw tl"></div>
    <div class="screw tr"></div>
    <div class="screw bl"></div>
    <div class="screw br"></div>

    <div class="screen" id="screen">
      <pre class="grid" id="grid"></pre>
    </div>

    <div class="controls">
      <span class="control-hint">◀ back</span>
      <span class="fraise-mark">fraise</span>
      <span class="control-hint">▶ select</span>
    </div>

    <div class="dial-container">
      <div class="dial" id="dial" tabindex="0" aria-label="Rotary dial for navigation">
        <div class="dial-indicator" id="dial-indicator"></div>
      </div>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <span>mf-web-7d9k-2x4p</span>
  <span class="hint">
    <kbd>↑</kbd><kbd>↓</kbd> navigate &nbsp; <kbd>↵</kbd> select &nbsp; <kbd>esc</kbd> back &nbsp; or drag the dial
  </span>
  <span id="clock">—</span>
</div>

<script>
  const GRID_COLS = 42;
  const GRID_ROWS = 22;
  const gridEl = document.getElementById('grid');
  const screenEl = document.getElementById('screen');
  const dialEl = document.getElementById('dial');
  const dialIndicator = document.getElementById('dial-indicator');
  const clockEl = document.getElementById('clock');

  function fitGridToScreen() {
    const rect = screenEl.getBoundingClientRect();
    const paddingX = parseFloat(getComputedStyle(screenEl).paddingLeft) * 2;
    const paddingY = parseFloat(getComputedStyle(screenEl).paddingTop) * 2;
    const availW = rect.width - paddingX;
    const availH = rect.height - paddingY;
    const charAspect = 0.6;
    const lineHeight = 1.35;
    const fontSizeForWidth = availW / (GRID_COLS * charAspect);
    const fontSizeForHeight = availH / (GRID_ROWS * lineHeight);
    const fontSize = Math.floor(Math.min(fontSizeForWidth, fontSizeForHeight));
    gridEl.style.fontSize = fontSize + 'px';
  }

  function pad(str, len) {
    str = String(str);
    if (str.length >= len) return str.slice(0, len);
    return str + ' '.repeat(len - str.length);
  }

  function box(title, lines, footer) {
    const inner = GRID_COLS - 2;
    const out = [];
    if (title) {
      const t = ' ' + title + ' ';
      const remaining = inner - t.length;
      const right = remaining - 1;
      out.push('┌─' + t + '─'.repeat(Math.max(0, right - 1)) + '┐');
    } else {
      out.push('┌' + '─'.repeat(inner) + '┐');
    }
    for (let i = 0; i < GRID_ROWS - 3; i++) {
      const line = lines[i] || '';
      out.push('│' + pad(line, inner) + '│');
    }
    out.push('├' + '─'.repeat(inner) + '┤');
    out.push('│' + pad(footer || '', inner) + '│');
    out.push('└' + '─'.repeat(inner) + '┘');
    return out.join('\n');
  }

  let state = {
    screen: 'home',
    cursor: 0,
    identity: 'mf-web-7d9k-2x4p',
    battery: '▓▓▓',
    time: '18:42'
  };

  const screens = {
    home: () => {
      const items = [
        { label: 'credentials', target: 'credentials' },
        { label: 'apps',        target: 'apps' },
        { label: 'games',       target: 'games' },
        { label: 'shop',        target: 'shop' },
        { label: 'paper',       target: 'paper' },
        { label: 'settings',    target: 'settings' },
      ];
      const lines = [''];
      items.forEach((item, i) => {
        const pointer = i === state.cursor ? '▸' : ' ';
        lines.push('  ' + pointer + ' ' + item.label);
      });
      for (let i = lines.length; i < GRID_ROWS - 3; i++) lines.push('');
      return {
        title: 'fraise.box',
        lines,
        footer: '  ◉  ' + state.identity + '          ' + state.time + '  ' + state.battery,
        items
      };
    },

    credentials: () => {
      const lines = [
        '',
        '  identity       ' + state.identity,
        '  issued         2026-04-14',
        '  shop           virtual (web)',
        '',
        '  balance',
        '  ─────────────────────────────────',
        '  usdc           $ 0.00',
        '  fraise credit  ƒ  0.00',
        '',
        '  this is a virtual device. it',
        '  cannot earn physical-presence',
        '  credentials. visit a fraise shop',
        '  to upgrade to a strawberry box.',
        '',
      ];
      while (lines.length < GRID_ROWS - 3) lines.push('');
      return { title: 'credentials', lines, footer: '  ◀ back                    ↻ refresh', items: [] };
    },

    apps: () => {
      const apps = [
        { name: 'field notes',    version: 'v1.2', size: '12k' },
        { name: 'ledger',         version: 'v0.9', size: ' 6k' },
        { name: 'radio',          version: 'v2.0', size: '22k' },
        { name: 'typewriter',     version: 'v1.0', size: ' 8k' },
        { name: 'gardener',       version: 'v0.4', size: '18k' },
        { name: 'minitel reader', version: 'v1.1', size: '14k' },
        { name: 'morse',          version: 'v1.0', size: ' 3k' },
      ];
      const lines = [''];
      apps.forEach((app, i) => {
        const pointer = i === state.cursor ? '▸' : ' ';
        lines.push('  ' + pointer + ' ' + pad(app.name, 20) + pad(app.version, 6) + '  ' + app.size);
      });
      while (lines.length < GRID_ROWS - 3) lines.push('');
      return { title: 'apps', lines, footer: '  ◀ back   ▶ open      ⊕ install more', items: apps.map(a => ({ label: a.name, target: 'app_stub' })) };
    },

    games: () => {
      const games = [
        { name: 'orchard',              author: 'austin'  },
        { name: 'the long walk',        author: 'elena'   },
        { name: 'typewriter detective', author: 'jonas'   },
        { name: 'grid',                 author: 'm.o.'    },
        { name: 'stanza',               author: 'yuki'    },
        { name: 'radio hour',           author: 'pavel'   },
        { name: 'strawberry thief',     author: 'austin'  },
      ];
      const lines = [''];
      games.forEach((g, i) => {
        const pointer = i === state.cursor ? '▸' : ' ';
        lines.push('  ' + pointer + ' ' + pad(g.name, 26) + 'by ' + g.author);
      });
      while (lines.length < GRID_ROWS - 3) lines.push('');
      return { title: 'games', lines, footer: '  ◀ back   ▶ play       ⊕ get games', items: games.map(g => ({ label: g.name, target: 'game_stub' })) };
    },

    shop: () => {
      const lines = [
        '', '  new this week', '  ─────────────────────────────────',
        '  ▸ stanza                   ƒ  4.00', '    a poetry generator', '',
        '    radio hour               ƒ  6.00', '    twelve stations of static', '',
        '    the long walk            ƒ  8.00', '    an idle walking game', '',
        '  featured', '  ─────────────────────────────────',
        '    field notes              free', '    orchard                  ƒ  2.00', '',
      ];
      while (lines.length < GRID_ROWS - 3) lines.push('');
      return { title: 'shop', lines, footer: '  ◀ back   ▶ purchase     balance ƒ 0', items: [] };
    },

    paper: () => {
      const lines = [
        ' § 1 · on closed worlds',
        '─────────────────────────────────────',
        '',
        ' a closed world is not a prison. it',
        ' is a discipline. the open internet',
        ' is a commons that never voted to',
        ' become one; its openness is an',
        ' accident of engineering that has',
        ' been retroactively moralized.',
        '',
        ' fraise proposes the opposite: a',
        ' deliberate smallness. a field with',
        ' a fence. an object you hold that',
        ' does not pretend to be a window to',
        ' everywhere.',
        '',
      ];
      while (lines.length < GRID_ROWS - 3) lines.push('');
      return { title: 'working paper no. 1', lines, footer: '  ← prev   → next          1 / 14', items: [] };
    },

    settings: () => {
      const items = [
        { label: 'display',       target: 'settings_stub' },
        { label: 'input',         target: 'settings_stub' },
        { label: 'bluetooth',     target: 'settings_stub', note: 'simulated' },
        { label: 'notifications', target: 'settings_stub' },
        { label: 'storage',       target: 'settings_stub', note: '22% used' },
        { label: 'about',         target: 'about' },
      ];
      const lines = [''];
      items.forEach((item, i) => {
        const pointer = i === state.cursor ? '▸' : ' ';
        const note = item.note || '';
        lines.push('  ' + pointer + ' ' + pad(item.label, 22) + note);
      });
      lines.push(''); lines.push('  ─────────────────────────────────'); lines.push('');
      lines.push('    device          ' + state.identity);
      lines.push('    os              fraise 0.1.0 (web)');
      lines.push('    runtime         browser');
      while (lines.length < GRID_ROWS - 3) lines.push('');
      return { title: 'settings', lines, footer: '  ◀ back                   ▶ select', items };
    },

    about: () => {
      const lines = [
        '', '  fraise os — web edition', '',
        '  this is a virtual fraise.box,',
        '  running in your browser as a',
        '  preview of the handheld device.',
        '',
        '  the physical fraise.box, issued',
        '  at fraise shops, includes a 1-bit',
        '  reflective display, a tactile',
        '  dial, a secure enclave, and mesh',
        '  radios for peer-to-peer',
        '  communication without internet.',
        '',
        '  this virtual version participates',
        '  in the fraise protocol but cannot',
        '  earn physical-presence credentials.',
        '',
      ];
      while (lines.length < GRID_ROWS - 3) lines.push('');
      return { title: 'about', lines, footer: '  ◀ back', items: [] };
    },

    app_stub: () => {
      const lines = [
        '', '', '', '              ◌ ◌ ◌', '',
        '         loading preview...', '', '',
        '  this app would run here in the',
        '  full fraise.box experience.',
        '',
        '  the virtual device demonstrates',
        '  the interface; the full lua',
        '  runtime is coming in stage 2.', '',
      ];
      while (lines.length < GRID_ROWS - 3) lines.push('');
      return { title: 'app', lines, footer: '  ◀ back', items: [] };
    },

    game_stub: () => {
      const lines = [
        '',
        ' season: spring        day: 14',
        '─────────────────────────────────────',
        '',
        '   ♣  ♣  ♣  .  .  .  ♣  ♣  ♣',
        '   ♣  ♣  ♣  .  ✽  .  ♣  ♣  ♣',
        '   .  .  .  .  .  .  .  .  .',
        '   .  ✿  ✿  .  ☺  .  ✿  ✿  .',
        '   .  ✿  ✿  .  .  .  ✿  ✿  .',
        '   .  .  .  .  .  .  .  .  .',
        '   ≈  ≈  ≈  ≈  ≈  ≈  ≈  ≈  ≈',
        '',
        ' > you see a strawberry blossom.',
        ' > this is a preview.',
        '',
      ];
      while (lines.length < GRID_ROWS - 3) lines.push('');
      return { title: 'orchard (preview)', lines, footer: '  ◀ back', items: [] };
    },

    settings_stub: () => {
      const lines = [
        '', '', '', '           coming in stage 2', '',
        '  this settings panel is a preview.',
        '  real settings will be available',
        '  in the next version of the',
        '  virtual device.', '',
      ];
      while (lines.length < GRID_ROWS - 3) lines.push('');
      return { title: 'settings', lines, footer: '  ◀ back', items: [] };
    },
  };

  let history = [];

  function render() {
    const screen = screens[state.screen]();
    gridEl.textContent = box(screen.title, screen.lines, screen.footer);
  }

  function currentItems() {
    const screen = screens[state.screen]();
    return screen.items || [];
  }

  function moveCursor(delta) {
    const items = currentItems();
    if (items.length === 0) return;
    state.cursor = (state.cursor + delta + items.length) % items.length;
    render();
  }

  function select() {
    const items = currentItems();
    if (items.length === 0) return;
    const item = items[state.cursor];
    if (!item || !item.target) return;
    history.push({ screen: state.screen, cursor: state.cursor });
    state.screen = item.target;
    state.cursor = 0;
    render();
  }

  function back() {
    if (history.length === 0) return;
    const prev = history.pop();
    state.screen = prev.screen;
    state.cursor = prev.cursor;
    render();
  }

  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') { e.preventDefault(); moveCursor(1); }
    else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') { e.preventDefault(); moveCursor(-1); }
    else if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); select(); }
    else if (e.key === 'Escape' || e.key === 'Backspace') { e.preventDefault(); back(); }
  });

  let dialRotation = 0;
  let dragStartY = null;
  let dragStartRotation = 0;
  let lastDialStep = 0;
  let lastTap = 0;
  const STEP_SIZE = 24;

  function updateDialVisual() {
    dialIndicator.style.transform =
      `translateX(-50%) rotate(${dialRotation * 12}deg) translateY(${Math.sin(dialRotation * 0.3) * 2}px)`;
  }

  dialEl.addEventListener('pointerdown', (e) => {
    dragStartY = e.clientY;
    dragStartRotation = dialRotation;
    lastDialStep = 0;
    dialEl.setPointerCapture(e.pointerId);
    e.preventDefault();
  });

  dialEl.addEventListener('pointermove', (e) => {
    if (dragStartY === null) return;
    const delta = e.clientY - dragStartY;
    dialRotation = dragStartRotation + delta / 3;
    updateDialVisual();
    const step = Math.floor(delta / STEP_SIZE);
    if (step !== lastDialStep) {
      const direction = step > lastDialStep ? 1 : -1;
      moveCursor(direction);
      lastDialStep = step;
    }
  });

  function endDrag(e) {
    const movedLittle = dragStartY !== null && Math.abs((e.clientY || 0) - dragStartY) < 5;
    const now = Date.now();
    if (movedLittle && now - lastTap < 300) select();
    if (movedLittle) lastTap = now;
    dragStartY = null;
  }

  dialEl.addEventListener('pointerup', endDrag);
  dialEl.addEventListener('pointercancel', endDrag);

  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    state.time = h + ':' + m;
    clockEl.textContent = state.time;
    if (state.screen === 'home') render();
  }
  setInterval(updateClock, 30000);
  updateClock();

  function resize() { fitGridToScreen(); render(); }
  window.addEventListener('resize', resize);

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      fitGridToScreen();
      render();
    });
  });
</script>

</body>
</html>
