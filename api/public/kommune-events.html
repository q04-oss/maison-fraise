<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events — Kommune</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #0E0E0C;
      --text:   #E8E2D8;
      --muted:  #6A6560;
      --birch:  #C4B49A;
      --border: #242220;
    }
    html {
      background: var(--bg); color: var(--text);
      font-family: 'DM Mono', monospace; font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }
    .wrap { width: 100%; max-width: 400px; }

    .back {
      font-size: 0.68rem; color: var(--muted); text-decoration: none;
      letter-spacing: 0.04em; display: inline-block; margin-bottom: 2.5rem;
      transition: color 0.15s;
    }
    .back:hover { color: var(--text); }

    h1 { font-size: 1.5rem; font-weight: 500; margin-bottom: 2.5rem; }

    .event {
      padding: 1.1rem 0; border-bottom: 1px solid var(--border);
    }
    .event:first-of-type { border-top: 1px solid var(--border); }
    .event-date {
      font-size: 0.65rem; color: var(--muted); letter-spacing: 0.05em; margin-bottom: 0.3rem;
    }
    .event-name {
      font-size: 0.88rem; font-weight: 500; color: var(--text); margin-bottom: 0.2rem;
    }
    .event-desc {
      font-size: 0.72rem; color: var(--muted); line-height: 1.6; margin-bottom: 0.75rem;
    }
    .ticket-link {
      font-size: 0.72rem; color: var(--birch); text-decoration: none; letter-spacing: 0.03em;
      transition: color 0.15s;
    }
    .ticket-link:hover { color: var(--text); }

    .none {
      font-size: 0.78rem; color: var(--muted);
      padding: 1.2rem 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="wrap">

    <a href="/kommune" class="back">← Kommune</a>

    <h1>Events</h1>

    <div class="none">no events scheduled — check back soon</div>

    <!--
      Event template:
      <div class="event">
        <div class="event-date">fri, may 9 · doors 8pm</div>
        <div class="event-name">Artist or Event Name</div>
        <div class="event-desc">Short description. $12 · limited seats.</div>
        <a href="#" class="ticket-link">get tickets →</a>
      </div>
    -->

  </div>
</body>
</html>
