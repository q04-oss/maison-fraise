<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cold press — by Kommune</title>
  <meta name="description" content="Honest reviews of Edmonton food and drink. By verified regulars at Kommune." />
  <meta property="og:title" content="cold press" />
  <meta property="og:description" content="Honest reviews of Edmonton food and drink. By verified regulars at Kommune." />
  <meta property="og:type" content="website" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #F9F7F4;
      --text:   #1A1A18;
      --muted:  #8A8880;
      --border: #E2DDD6;
      --red:    #C0392B;
    }
    html, body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Mono', monospace; font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
    }
    .header-left { display: flex; align-items: baseline; gap: 1rem; }
    .pub-name {
      font-size: 1rem; font-weight: 500; color: var(--text);
      letter-spacing: 0.02em; text-decoration: none;
    }
    .pub-name span { color: var(--red); }
    .pub-desc {
      font-size: 0.65rem; color: var(--muted); letter-spacing: 0.03em;
    }
    .header-right a {
      font-size: 0.65rem; color: var(--muted);
      text-decoration: none; letter-spacing: 0.04em;
      transition: color 0.15s;
    }
    .header-right a:hover { color: var(--text); }

    /* ── Content ── */
    .content {
      flex: 1;
      padding: 1.5rem;
      max-width: 640px;
    }

    /* ── Empty state ── */
    .empty {
      padding: 0.75rem 0;
      border-top: 1px solid var(--border);
    }
    .empty p {
      font-size: 0.72rem; color: var(--muted); line-height: 1.8;
    }

    /* ── Review entry ── */
    .review {
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
    }
    .review:first-child { border-top: 1px solid var(--border); }
    .review-top {
      display: flex; justify-content: space-between;
      align-items: baseline; gap: 1rem; margin-bottom: 0.3rem;
    }
    .review-name { font-size: 0.85rem; color: var(--text); }
    .review-meta {
      display: flex; gap: 1rem; align-items: baseline; flex-shrink: 0;
    }
    .review-score { font-size: 0.85rem; color: var(--red); }
    .review-date { font-size: 0.62rem; color: var(--muted); }
    .review-neighbourhood {
      font-size: 0.62rem; color: var(--muted);
      letter-spacing: 0.04em; margin-bottom: 0.5rem;
    }
    .review-verdict {
      font-size: 0.72rem; color: var(--text);
      line-height: 1.75; max-width: 520px;
    }

    /* ── Footer ── */
    .foot {
      border-top: 1px solid var(--border);
      padding: 1.25rem 1.5rem;
      display: flex; justify-content: space-between; align-items: baseline;
    }
    .foot-name {
      font-size: 1.5rem; font-weight: 500; color: var(--text);
    }
    .foot-name span { color: var(--red); }
    .foot-right { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.04em; }

    @media (max-width: 480px) {
      .pub-desc { display: none; }
      .foot-name { font-size: 1.2rem; }
      .review-top { flex-direction: column; gap: 0.2rem; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <a href="/kommune/press" class="pub-name">cold<span>.</span>press</a>
      <span class="pub-desc">Edmonton food & drink — honestly</span>
    </div>
    <div class="header-right">
      <a href="/kommune">← Kommune</a>
    </div>
  </div>

  <div class="content" id="content">
    <div class="empty">
      <p>Honest reviews of Edmonton food and drink, written by verified regulars at Kommune.<br />First issue coming.</p>
    </div>
  </div>

  <div class="foot">
    <div class="foot-name">cold<span>.</span>press</div>
    <div class="foot-right">by Kommune · Treaty 6 · Wîhkwêntôwin</div>
  </div>

</body>
</html>
