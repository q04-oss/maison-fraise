<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kommune</title>
  <meta name="description" content="Kommune — Snack Bar. 11931 Jasper Ave NW, Edmonton." />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F9F7F4;
      --text: #1A1A18;
      --muted: #8A8880;
      --border: #E2DDD6;
    }
    html {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }
    .wrap {
      width: 100%;
      max-width: 400px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 0.3rem;
    }
    .meta {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.03em;
      line-height: 1.8;
      margin-bottom: 2.5rem;
    }

    .desc {
      font-size: 0.82rem;
      line-height: 1.9;
      color: var(--text);
      margin-bottom: 2.5rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      margin-bottom: 3rem;
    }
    .links a {
      font-size: 0.78rem;
      color: var(--muted);
      text-decoration: none;
      padding: 0.3rem 0;
      transition: color 0.15s;
    }
    .links a:hover { color: var(--text); }

    footer {
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.03em;
      line-height: 1.8;
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="wrap">

    <h1>Kommune</h1>
    <div class="meta">
      Snack Bar · 11931 Jasper Ave NW<br />
      daily from 10am · reservations welcome<br />
      matcha by Whisked
    </div>

    <p class="desc">
      Elevated plates, a serious bar program, live music. Full NA options throughout.
    </p>

    <div class="links">
      <a href="/menu">menu →</a>
      <a href="/events">events →</a>
      <a href="https://open.spotify.com" target="_blank" rel="noopener">Spotify →</a>
      <a href="https://instagram.com/kommunesnackbar" target="_blank" rel="noopener">Instagram →</a>
      <a href="mailto:hello@kommunesnackbar.ca">hello@kommunesnackbar.ca →</a>
    </div>

    <footer>
      Treaty 6 Territory · Wîhkwêntôwin
    </footer>

  </div>
</body>
</html>
