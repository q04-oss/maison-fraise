<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kommune</title>
  <meta name="description" content="$0 oat milk. Kommune, 11931 Jasper Ave NW, Edmonton." />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #F9F7F4;
      --text:   #1A1A18;
      --muted:  #8A8880;
      --border: #E2DDD6;
    }
    html {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }
    .wrap {
      width: 100%;
      max-width: 400px;
    }

    .headline {
      font-size: 2.8rem;
      font-weight: 500;
      line-height: 1.15;
      color: var(--text);
      margin-bottom: 1.5rem;
      letter-spacing: -0.02em;
    }

    .sub {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.9;
      letter-spacing: 0.03em;
      margin-bottom: 3rem;
      border-top: 1px solid var(--border);
      padding-top: 1.25rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      margin-bottom: 3rem;
    }
    .links a {
      font-size: 0.78rem;
      color: var(--muted);
      text-decoration: none;
      padding: 0.3rem 0;
      transition: color 0.15s;
    }
    .links a:hover { color: var(--text); }

    footer {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      line-height: 1.8;
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="wrap">

    <p class="headline">$0 oat milk.<br />Always.</p>

    <div class="sub">
      Kommune · 11931 Jasper Ave NW · Edmonton<br />
      daily from 10am · reservations welcome<br />
      oat milk by Minor Figures · matcha by Whisked<br />
      WiFi · Kommune@1
    </div>

    <div class="links">
      <a href="/kommune/menu">menu →</a>
      <a href="/kommune/events">events →</a>
      <a href="https://open.spotify.com/playlist/3EQfi5R0ziWSpFWLqpowmO" target="_blank" rel="noopener">Spotify →</a>
      <a href="https://instagram.com/kommune.whisked" target="_blank" rel="noopener">Instagram →</a>
      <a href="mailto:hello@kommunesnackbar.ca">hello@kommunesnackbar.ca →</a>
    </div>

    <footer>
      Treaty 6 Territory · Wîhkwêntôwin
    </footer>

  </div>
</body>
</html>
