<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>box fraise</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #FFFFFF;
      --text:   #1C1C1E;
      --muted:  #8E8E93;
      --border: #E5E1DA;
      --card:   #F7F5F2;
      --search: #F0EDE8;
    }
    html {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }
    body { min-height: 100dvh; }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      z-index: 10;
    }
    .header a {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.03em;
      flex-shrink: 0;
    }
    .header a:hover { color: var(--muted); }

    .search-form {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--search);
      border: 1px solid var(--border);
      border-radius: 9999px;
      padding: 0.5rem 1rem;
      gap: 0.6rem;
      max-width: 560px;
      transition: border-color 0.15s, background 0.15s;
    }
    .search-form:focus-within {
      border-color: var(--text);
      background: var(--bg);
    }
    .search-icon {
      flex-shrink: 0;
      color: var(--muted);
      width: 14px;
      height: 14px;
    }
    .search-input {
      flex: 1;
      border: none;
      background: transparent;
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      color: var(--text);
      outline: none;
      min-width: 0;
    }
    .search-input::placeholder { color: var(--muted); }

    /* ── Results ── */
    main {
      max-width: 640px;
      margin-inline: auto;
      padding: 2rem 1.5rem;
    }

    .results { display: flex; flex-direction: column; }

    .result {
      padding-block: 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .result:first-child { border-top: 1px solid var(--border); }

    .result-display-url {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      margin-bottom: 0.25rem;
    }
    .result-title {
      font-size: 0.88rem;
      font-weight: 500;
      margin-bottom: 0.3rem;
    }
    .result-title a {
      color: var(--text);
      text-decoration: none;
    }
    .result-title a:hover { text-decoration: underline; text-underline-offset: 3px; }
    .result-description {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.7;
    }

    /* ── Table event cards ── */
    .table-events {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    .table-event-card {
      background: var(--card);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      text-decoration: none;
      color: var(--text);
      display: block;
      transition: background 0.1s;
    }
    .table-event-card:hover { background: var(--border); }
    .table-event-label {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    .table-event-title {
      font-size: 0.88rem;
      font-weight: 500;
      margin-bottom: 0.25rem;
    }
    .table-event-meta {
      font-size: 0.7rem;
      color: var(--muted);
      line-height: 1.6;
    }
    .table-event-price {
      font-size: 0.75rem;
      font-weight: 500;
      margin-top: 0.4rem;
    }

    .status {
      font-size: 0.75rem;
      color: var(--muted);
      padding-block: 2rem;
      letter-spacing: 0.03em;
    }

    .query-line {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>

  <header class="header">
    <a href="/">box fraise</a>
    <form class="search-form" id="search-form" autocomplete="off">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        class="search-input"
        id="search-input"
        type="text"
        placeholder="search privately."
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      />
    </form>
  </header>

  <main>
    <div id="results-container">
      <div class="status">searching —</div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const q = params.get('q') ?? '';
    const input = document.getElementById('search-input');
    input.value = q;

    const internalRoutes = {
      'device': '/device', 'paper': '/paper', 'shop': '/shop',
      'support': '/support', 'privacy': '/privacy',
      'beta': 'https://testflight.apple.com/join/zJG1Wc5Y',
      'chocolatier': '/chocolatier', 'operator': '/operator', 'table': '/table',
    };

    document.getElementById('search-form').addEventListener('submit', e => {
      e.preventDefault();
      const query = input.value.trim();
      if (!query) return;
      const lower = query.toLowerCase().replace(/^\//, '');
      if (internalRoutes[lower]) { window.location.href = internalRoutes[lower]; return; }
      window.location.href = '/search?q=' + encodeURIComponent(query);
    });

    async function run() {
      if (!q) {
        document.getElementById('results-container').innerHTML = '<div class="status">no query.</div>';
        return;
      }
      document.title = `${q} — box fraise`;

      try {
        const res = await fetch('/api/brave?q=' + encodeURIComponent(q));
        const data = await res.json();

        if (!res.ok || (!data.results?.length && !data.table_events?.length)) {
          document.getElementById('results-container').innerHTML = '<div class="status">no results.</div>';
          return;
        }

        const formatPrice = cents => `CA$${(cents / 100).toFixed(0)}`;
        const formatDate = iso => {
          if (!iso) return 'date tbd';
          const d = new Date(iso);
          const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          return `${months[d.getMonth()]} ${d.getDate()}`;
        };

        const tableEventsHtml = data.table_events?.length ? `
          <div class="table-events">
            ${data.table_events.map(e => {
              const seatsLeft = e.capacity - e.seats_taken;
              const slug = e.venue_slug ?? '';
              return `
                <a class="table-event-card" href="/table/${slug}">
                  <div class="table-event-label">table · box fraise</div>
                  <div class="table-event-title">${escHtml(e.title.toLowerCase())}</div>
                  <div class="table-event-meta">${escHtml(e.instructor_name.toLowerCase())} · ${escHtml(e.venue_name.toLowerCase())} · ${e.event_type === 'private' ? 'private' : 'group'}</div>
                  <div class="table-event-meta">${formatDate(e.event_date)} · ${seatsLeft > 0 ? seatsLeft + ' seats left' : 'waitlist open'}</div>
                  <div class="table-event-price">${formatPrice(e.price_cents)}</div>
                </a>
              `;
            }).join('')}
          </div>
        ` : '';

        document.getElementById('results-container').innerHTML = `
          <div class="query-line">${data.results.length} results for "${escHtml(q)}"</div>
          ${tableEventsHtml}
          <div class="results">
            ${data.results.map(r => `
              <div class="result">
                <div class="result-display-url">${escHtml(r.display_url)}</div>
                <div class="result-title"><a href="/go?url=${encodeURIComponent(r.url)}" rel="noopener noreferrer">${escHtml(r.title)}</a></div>
                ${r.description ? `<div class="result-description">${escHtml(r.description)}</div>` : ''}
              </div>
            `).join('')}
          </div>
        `;
      } catch {
        document.getElementById('results-container').innerHTML = '<div class="status">search unavailable.</div>';
      }
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    run();
  </script>
</body>
</html>
